        <span style="font-size:22px;font-weight:700;color:${calCol};letter-spacing:-.03em">${totals.cal}<span style="font-size:13px;font-weight:400;color:var(--muted);margin-left:3px">kcal</span></span>
        <span style="font-size:11px;color:${calCol};font-family:monospace;opacity:.85">${calPct}% of daily target</span>
      </div>
      <div style="height:5px;background:rgba(0,0,0,0.08);border-radius:99px;margin-bottom:5px">
        <div style="height:100%;width:${calBar}%;background:${calCol};border-radius:99px"></div>
      </div>
      <div style="font-size:10px;color:var(--muted);font-family:monospace;text-transform:uppercase;letter-spacing:.06em">Target ${targets.cal} kcal/day</div>
    </div>`;
    })()}
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px">
      ${macroTile('Protein', totals.protein, targets.protein, 'var(--protein)', 'var(--protein-bg)')}
      ${macroTile('Carbs',   totals.carbs,   targets.carbs,   'var(--carbs)',   'var(--carbs-bg)')}
      ${macroTile('Fat',     totals.fat,     targets.fat,     'var(--fat)',     'var(--fat-bg)')}
      ${macroTile('Fibre',   totals.fibre,   targets.fibre,   'var(--fibre)',   'var(--fibre-bg)')}
    </div>
    ${totals.sat_fat > 0 || totals.poly_fat > 0 || totals.mono_fat > 0 ? (() => {
      const satLimit = Math.round(targets.cal * 0.10 / 9);
      const satPct   = Math.min(Math.round(totals.sat_fat / satLimit * 100), 150);
      const satColor = satPct > 100 ? '#dc2626' : satPct > 80 ? '#d97706' : '#16a34a';
      const satBg    = satPct > 100 ? '#fef2f2' : satPct > 80 ? '#fffbeb' : '#f0fdf4';
      const satBorder= satPct > 100 ? '#fecaca' : satPct > 80 ? '#fde68a' : '#bbf7d0';
      return `
    <div style="background:#f9fafb;border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:12px">
      <div class="mono" style="font-size:10px;color:var(--muted);letter-spacing:.08em;margin-bottom:10px">FAT BREAKDOWN</div>
      ${totals.sat_fat > 0 ? `
      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px">
          <span style="font-size:12px;color:#374151">Saturated <span style="font-size:10px;color:var(--muted)">(keep under limit)</span></span>
          <span style="font-size:12px;font-weight:700;font-family:monospace;color:${satColor}">${totals.sat_fat}g <span style="font-weight:400;color:var(--muted)">/ ${satLimit}g</span></span>
        </div>
        <div style="height:4px;background:#f3f4f6;border-radius:99px;overflow:hidden">
          <div style="height:100%;width:${Math.min(satPct,100)}%;background:${satColor};border-radius:99px"></div>
        </div>
        <div style="font-size:10px;font-family:monospace;color:${satColor};margin-top:2px">${satPct > 100 ? `${satPct - 100}% over limit for this meal` : `${satPct}% of daily limit used`}</div>
      </div>` : ''}
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        ${totals.mono_fat > 0 ? `<div style="font-size:12px"><span style="font-weight:700;color:#16a34a;font-family:monospace">${totals.mono_fat}g</span> <span style="color:#6b7280">Monounsaturated <span style="font-size:10px;color:#16a34a">↑ aim higher</span></span></div>` : ''}
        ${totals.poly_fat > 0 ? `<div style="font-size:12px"><span style="font-weight:700;color:#0284c7;font-family:monospace">${totals.poly_fat}g</span> <span style="color:#6b7280">Polyunsaturated <span style="font-size:10px;color:#0284c7">↑ aim higher</span></span></div>` : ''}
      </div>
    </div>`;
    })() : ''}

    <!-- Per-meal micronutrient breakdown -->
    ${(() => {
      const rdas = getMicroRDAs(state.profile);
      const MICRO_META = [
        { key:'vitamin_d', label:'Vitamin D', unit:'µg' },
        { key:'iron',      label:'Iron',      unit:'mg' },
        { key:'zinc',      label:'Zinc',      unit:'mg' },
        { key:'magnesium', label:'Magnesium', unit:'mg' },
        { key:'b12',       label:'B12',       unit:'µg' },
        { key:'calcium',   label:'Calcium',   unit:'mg' },
        { key:'potassium', label:'Potassium', unit:'mg' },
      ];
      const hasMicro = MICRO_META.some(m => (totals[m.key] || 0) > 0);
      if (!hasMicro) return '';
      const rows = MICRO_META.map(({ key, label, unit }) => {
        const val = totals[key] || 0;
        const rda = rdas[key] || 0;
        if (!rda) return '';
        const pct = Math.min(Math.round(val / rda * 100), 100);
        const color = pct >= 75 ? '#16a34a' : pct >= 40 ? '#d97706' : '#dc2626';
        const bg    = pct >= 75 ? '#f0fdf4' : pct >= 40 ? '#fffbeb' : '#fef2f2';
        return `
        <div style="margin-bottom:7px">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px">
            <span style="font-size:11px;color:#374151">${label}</span>
            <span style="font-size:11px;font-family:monospace;color:${color}">${val.toFixed(1)}${unit} <span style="color:var(--muted);font-weight:400">(${pct}% RDA)</span></span>
          </div>
          <div style="height:3px;background:#f3f4f6;border-radius:99px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:${color};border-radius:99px"></div>
          </div>
        </div>`;
      }).join('');
      return `
    <div style="background:#f9fafb;border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:12px">
      <div class="mono" style="font-size:10px;color:var(--muted);letter-spacing:.08em;margin-bottom:10px">MICRONUTRIENTS — THIS MEAL</div>
      ${rows}
      <div style="font-size:10px;color:var(--muted);margin-top:4px">% of daily RDA from this meal alone · see full day picture in gaps screen</div>
    </div>`;
    })()}

    <!-- Gap analysis -->
    <div class="card" style="margin-bottom:12px">
      <div class="label" style="margin-bottom:2px">Today's Gap Analysis</div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:16px;font-style:italic">Based on this meal only · Log more meals for your full day picture</p>
      ${gaps.map((g, i) => `
        <div style="display:flex;gap:12px;${i < gaps.length - 1 ? 'margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #f3f4f6' : ''}">
          <div class="impact impact-${g.impact}">${g.impact}</div>
          <div>
            <div class="mono" style="font-size:11px;color:var(--muted);margin-bottom:3px">${g.label}</div>
            <div style="font-size:13px;color:#374151;line-height:1.5">${g.text}</div>
          </div>
        </div>`).join('')}
    </div>

    <!-- Logging nudge / timestamp -->
    ${!state.viewingLog ? `
    ${state.mealSaveError
      ? `<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:12px 16px;margin-bottom:12px;font-size:12px;color:#dc2626;line-height:1.5">⚠️ Couldn't save this meal: ${state.mealSaveError}</div>`
      : `<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:12px 16px;margin-bottom:12px;display:flex;gap:10px;align-items:center">
      <span style="font-size:18px;flex-shrink:0">📊</span>
      <div>
        <p style="font-size:12px;color:#166534;line-height:1.5;margin:0 0 4px">Meal saved.</p>
        <button onclick="setState({screen:'home',mealSaveError:null});loadMealLogs();" style="background:none;border:none;padding:0;font-size:12px;color:#15803d;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:underline">← Back to home to see your meal history</button>
      </div>
    </div>`}` : `
    <div style="background:#f9fafb;border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin-bottom:12px">
      <p style="font-size:11px;color:var(--muted);font-family:monospace;margin:0">📅 ${new Date(state.viewingLog.logged_at).toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' })} · ${new Date(state.viewingLog.logged_at).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' })}</p>
    </div>`}

    <!-- Assumptions — collapsed by default -->
    <button onclick="toggleAssumptions()" style="width:100%;display:flex;align-items:center;justify-content:space-between;background:white;border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:${state.assumptionsExpanded ? '0' : '12px'};cursor:pointer;box-shadow:var(--shadow)">
      <span style="font-size:13px;color:var(--subtle)">📋 How WISE analysed this <span style="color:var(--muted);font-size:12px">(${filteredAssumptions.length} assumptions)</span></span>
      <span style="font-size:11px;color:var(--muted)">${state.assumptionsExpanded ? '▲' : '▼'}</span>
    </button>
    ${state.assumptionsExpanded ? `
    <div class="card" style="border-top-left-radius:0;border-top-right-radius:0;margin-bottom:12px;border-top:none">
      ${filteredAssumptions.map(a => `
        <div style="display:flex;gap:10px;font-size:13px;color:#374151;line-height:1.5;margin-bottom:10px">
          <span style="color:#d1d5db;flex-shrink:0;margin-top:2px">→</span><span>${a}</span>
        </div>`).join('')}
      <div style="margin-top:10px;padding:10px 14px;background:#f9fafb;border-radius:10px;display:flex;align-items:center;gap:10px">
        <span class="badge badge-${confCls}">${(r.confidence||'').toUpperCase()} CONFIDENCE</span>
        <span style="font-size:12px;color:var(--subtle)">${r.confidenceNote||''}</span>
      </div>
    </div>` : ''}

    ${!state.viewingLog ? `<button class="btn-primary" onclick="setState({screen:'home'})">→ See today's progress</button>` : ''}

    ${renderTabBar('today')}

    ${isPhoto ? `<p style="text-align:center;font-size:11px;color:#d1d5db;margin-top:4px">Photo estimates can vary ±25% · USDA FoodData Central</p>` : `<p style="text-align:center;font-size:11px;color:#d1d5db;margin-top:4px">USDA FoodData Central · AI-powered analysis</p>`}`;
}

function renderFuel() {
  const act = state.fuelActivity;
  const isRest = act === 'rest';

  function actBtn(id, label, emoji) {
    return `<button onclick="setState({fuelActivity:'${id}'})" style="flex:1;padding:11px 4px;border-radius:10px;border:1px solid ${act===id?'#111':'var(--border)'};background:${act===id?'#111':'white'};color:${act===id?'white':'var(--subtle)'};font-size:13px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px">
      <span style="font-size:18px">${emoji}</span><span>${label}</span>
    </button>`;
  }
  function selBtn(key, id, label, current) {
    return `<button onclick="setState({${key}:'${id}'})" style="flex:1;padding:10px 0;border-radius:10px;border:1px solid ${current===id?'#111':'var(--border)'};background:${current===id?'#111':'white'};color:${current===id?'white':'var(--subtle)'};font-size:13px;font-weight:500;cursor:pointer">${label}</button>`;
  }

  if (state.fuelPlanning) {
    return `
      <button class="btn-back" onclick="setState({screen:'home'})">← Back</button>
      <div style="text-align:center;padding:48px 0">
        <div style="font-size:36px;margin-bottom:16px">⚡</div>
        <div class="spinner"></div>
        <div style="font-size:15px;font-weight:500;margin-bottom:6px">Building your fuel plan…</div>
        <div class="mono" style="font-size:12px;color:var(--muted);animation:pulse 1.5s ease-in-out infinite">Calculating targets and timing your meals</div>
      </div>`;
  }

  return `
    <button class="btn-back" onclick="setState({screen:'home'})">← Back</button>
    <div class="mono" style="font-size:11px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-bottom:6px">Pro Feature</div>
    <h2 style="font-size:26px;font-weight:600;letter-spacing:-.03em;margin-bottom:4px">Plan my fuel</h2>
    <p style="font-size:14px;color:var(--subtle);margin-bottom:24px">Tell WISE what you're doing today and get an ingredient-level meal plan built around your training.</p>

    ${state.fuelError ? `<div class="error-box">⚠ ${state.fuelError}</div>` : ''}

    <div class="card">
      <div class="label">Today's training</div>
      <div style="display:flex;gap:8px;margin-bottom:${isRest ? '0' : '20px'}">
        ${actBtn('strength', 'Strength', '🏋️')}
        ${actBtn('cardio',   'Cardio',   '🏃')}
        ${actBtn('mixed',    'Mixed',    '⚡')}
        ${actBtn('rest',     'Rest day', '😴')}
      </div>

      <div style="margin-bottom:20px">
        <div class="label">Meals today</div>
        <div style="display:flex;gap:8px">
          ${[2,3,4,5].map(n => `<button onclick="setState({fuelMeals:${n}})" style="flex:1;padding:10px 0;border-radius:10px;border:1px solid ${state.fuelMeals===n?'#111':'var(--border)'};background:${state.fuelMeals===n?'#111':'white'};color:${state.fuelMeals===n?'white':'var(--subtle)'};font-size:14px;font-weight:600;cursor:pointer">${n}</button>`).join('')}
        </div>
      </div>

      ${!isRest ? `
      <div style="margin-bottom:20px">
        <div class="label">Effort level</div>
        <div style="display:flex;gap:8px">
          ${selBtn('fuelEffort','light','Light 💧',state.fuelEffort)}
          ${selBtn('fuelEffort','moderate','Moderate 🔥',state.fuelEffort)}
          ${selBtn('fuelEffort','hard','Hard 💥',state.fuelEffort)}
        </div>
      </div>

      <div>
        <div class="label">Training time</div>
        <div style="display:flex;gap:8px">
          ${selBtn('fuelWhen','morning','Morning 🌅',state.fuelWhen)}
          ${selBtn('fuelWhen','lunchtime','Lunchtime ☀️',state.fuelWhen)}
          ${selBtn('fuelWhen','afternoon','Afternoon 🌤',state.fuelWhen)}
          ${selBtn('fuelWhen','evening','Evening 🌙',state.fuelWhen)}
        </div>
      </div>` : `
      <p style="font-size:13px;color:var(--muted);margin-top:12px;font-style:italic">Rest day plan: balanced macros across 3–4 meals, moderate carbs, high protein.</p>`}
    </div>

    ${(() => {
      const todayStr  = new Date().toDateString();
      const todayLogs = state.mealLogs.filter(log => log.logged_at && new Date(log.logged_at).toDateString() === todayStr);
      if (todayLogs.length === 0) return '';
      const consumed = todayLogs.reduce((acc, log) => {
        const t = log.totals || {};
        return { cal: Math.round(acc.cal + (t.cal||0)), protein: +((acc.protein+(t.protein||0)).toFixed(1)) };
      }, { cal: 0, protein: 0 });
      return `
      <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:14px;padding:14px 16px;margin-bottom:4px">
        <div style="font-size:13px;font-weight:600;color:#166534;margin-bottom:4px">📊 ${todayLogs.length} meal${todayLogs.length>1?'s':''} already logged today</div>
        <div style="font-size:12px;color:#15803d;line-height:1.5">${consumed.cal} kcal · ${consumed.protein}g protein consumed so far — WISE will plan your remaining meals around what's left.</div>
      </div>`;
    })()}
    <button class="btn-primary" onclick="generateFuelPlan()">Generate my fuel plan →</button>`;
}

function renderFuelResults() {
  const plan = state.fuelPlan;
  if (!plan || !plan.meals) return `<div class="error-box">No plan to display.</div>`;

  const t = plan._targets || calcTargets(state.profile);

  function slotEmoji(slot) {
    const s = (slot || '').toLowerCase();
    if (s.includes('breakfast'))                        return '🌅';
    if (s.includes('pre-train') || s.includes('pre train') || s.includes('pre-workout')) return '⚡';
    if (s.includes('post-train') || s.includes('post train') || s.includes('post-workout') || s.includes('recovery')) return '💪';
    if (s.includes('lunch'))                            return '☀️';
    if (s.includes('dinner') || s.includes('supper'))   return '🌙';
    if (s.includes('snack'))                            return '🍎';
    if (s.includes('intra') || s.includes('during'))    return '🏃';
    return '🍽️';
  }

  return `
    <button class="btn-back" onclick="setState({screen:'fuel',fuelPlan:null})">← Back</button>
    <div style="margin-bottom:20px">
      <div class="mono" style="font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">⚡ Fuel Plan · ${state.fuelActivity === 'rest' ? 'Rest Day' : state.fuelEffort + ' ' + state.fuelActivity}</div>
      <h2 style="font-size:24px;font-weight:600;letter-spacing:-.03em;line-height:1.2">${plan.dayType || "Today's Fuel Plan"}</h2>
    </div>

    ${plan._consumed && plan._consumed.cal > 0 ? `
    <div style="background:#f9fafb;border:1px solid var(--border);border-radius:14px;padding:12px 16px;margin-bottom:10px">
      <div style="font-size:11px;font-family:monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Already eaten today</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${[['kcal', plan._consumed.cal, '#374151'], ['Protein', plan._consumed.protein+'g', 'var(--protein)'], ['Carbs', plan._consumed.carbs+'g', 'var(--carbs)'], ['Fat', plan._consumed.fat+'g', 'var(--fat)']].map(([lbl,val,col])=>`
        <div style="font-size:12px;padding:4px 10px;border-radius:99px;background:white;border:1px solid var(--border)">
          <span style="font-weight:600;color:${col};font-family:monospace">${val}</span>
          <span style="color:var(--muted);margin-left:3px">${lbl}</span>
        </div>`).join('')}
      </div>
      <div style="font-size:12px;color:var(--muted);margin-top:8px">The plan below accounts for these — covering your remaining targets for the day.</div>
    </div>` : ''}

    <!-- Daily targets strip -->
    <div class="card" style="margin-bottom:4px">
      <div class="label" style="margin-bottom:10px">Today's adjusted targets</div>
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px">
        ${[['kcal',t.cal,'var(--text)'],['Protein',t.protein+'g','var(--protein)'],['Carbs',t.carbs+'g','var(--carbs)'],['Fat',t.fat+'g','var(--fat)'],['Fibre',t.fibre+'g','var(--fibre)']].map(([lbl,val,col])=>`
        <div style="text-align:center">
          <div style="font-size:14px;font-weight:700;color:${col}">${val}</div>
          <div style="font-size:9px;color:var(--muted);font-family:monospace;text-transform:uppercase;margin-top:2px">${lbl}</div>
        </div>`).join('')}
      </div>
    </div>

    <!-- How did we get here -->
    <button onclick="setState({fuelTargetsExpanded:!state.fuelTargetsExpanded})"
      style="width:100%;display:flex;align-items:center;justify-content:space-between;background:white;border:1px solid var(--border);border-top:none;border-bottom-left-radius:12px;border-bottom-right-radius:12px;padding:10px 16px;margin-bottom:12px;cursor:pointer">
      <span style="font-size:12px;color:var(--subtle)">💡 How did we get to these numbers?</span>
      <span style="font-size:11px;color:var(--muted)">${state.fuelTargetsExpanded ? '▲' : '▼'}</span>
    </button>
    ${renderFuelTargetsBreakdown(t)}

    <!-- Meal cards -->
    ${plan.meals.map(meal => `
    <div class="card" style="margin-bottom:10px">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:2px">
        <div style="font-size:16px;font-weight:600">${slotEmoji(meal.slot)} ${meal.slot}</div>
        <div class="mono" style="font-size:11px;color:var(--muted)">${meal.mealMacros?.cal || ''}${meal.mealMacros?.cal ? ' kcal' : ''}</div>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">${meal.timing || ''}</div>
      ${meal.purpose ? `<div style="font-size:13px;color:var(--subtle);font-style:italic;margin-bottom:12px;line-height:1.5;padding:10px 12px;background:#f9fafb;border-radius:8px">"${meal.purpose}"</div>` : ''}

      <div style="margin-bottom:10px">
        ${(meal.ingredients || []).map(ing => `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f9fafb">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:18px">${ing.emoji || '🍽️'}</span>
              <div>
                <div style="font-size:13px;font-weight:500">${ing.name}</div>
                ${ing.note ? `<div style="font-size:11px;color:var(--muted);font-style:italic">${ing.note}</div>` : ''}
              </div>
            </div>
            <div class="mono" style="font-size:13px;font-weight:600;color:var(--subtle);flex-shrink:0;margin-left:8px">${ing.amount}</div>
          </div>`).join('')}
      </div>

      ${meal.mealMacros ? `
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${meal.mealMacros.protein ? `<span style="font-size:11px;padding:3px 8px;border-radius:99px;background:var(--protein-bg);color:var(--protein);font-family:monospace">${meal.mealMacros.protein}g P</span>` : ''}
        ${meal.mealMacros.carbs   ? `<span style="font-size:11px;padding:3px 8px;border-radius:99px;background:var(--carbs-bg);color:var(--carbs);font-family:monospace">${meal.mealMacros.carbs}g C</span>` : ''}
        ${meal.mealMacros.fat     ? `<span style="font-size:11px;padding:3px 8px;border-radius:99px;background:var(--fat-bg);color:var(--fat);font-family:monospace">${meal.mealMacros.fat}g F</span>` : ''}
        ${meal.mealMacros.fibre   ? `<span style="font-size:11px;padding:3px 8px;border-radius:99px;background:var(--fibre-bg);color:var(--fibre);font-family:monospace">${meal.mealMacros.fibre}g Fi</span>` : ''}
      </div>` : ''}
    </div>`).join('')}

    <!-- Day notes -->
    ${plan.dayNotes && plan.dayNotes.length ? `
    <div class="card" style="margin-bottom:12px">
      <div class="label">Key notes for today</div>
      ${plan.dayNotes.map(note => `
        <div style="display:flex;gap:10px;font-size:13px;color:#374151;line-height:1.5;margin-bottom:10px">

function renderGaps() {

  const todayStr   = new Date().toDateString();

  const todayLogs  = state.mealLogs.filter(log => log.logged_at && new Date(log.logged_at).toDateString() === todayStr);

  // Sum running totals
  const running = todayLogs.reduce((acc, log) => {
    const t = log.totals || {};
    return {
      cal:      Math.round(acc.cal      + (t.cal      || 0)),
      protein:  +((acc.protein  + (t.protein  || 0)).toFixed(1)),
      fat:      +((acc.fat      + (t.fat      || 0)).toFixed(1)),
      sat_fat:   +((acc.sat_fat   + (t.sat_fat   || 0)).toFixed(1)),
      poly_fat:  +((acc.poly_fat  + (t.poly_fat  || 0)).toFixed(1)),
      mono_fat:  +((acc.mono_fat  + (t.mono_fat  || 0)).toFixed(1)),
      carbs:     +((acc.carbs     + (t.carbs     || 0)).toFixed(1)),
      fibre:     +((acc.fibre     + (t.fibre     || 0)).toFixed(1)),
      vitamin_d: +((acc.vitamin_d + (t.vitamin_d || 0)).toFixed(3)),
      iron:      +((acc.iron      + (t.iron      || 0)).toFixed(3)),
      zinc:      +((acc.zinc      + (t.zinc      || 0)).toFixed(3)),
      magnesium: +((acc.magnesium + (t.magnesium || 0)).toFixed(1)),
      b12:       +((acc.b12       + (t.b12       || 0)).toFixed(3)),
      calcium:   +((acc.calcium   + (t.calcium   || 0)).toFixed(1)),
      potassium: +((acc.potassium + (t.potassium || 0)).toFixed(1)),
    };
  }, { cal: 0, protein: 0, fat: 0, sat_fat: 0, poly_fat: 0, mono_fat: 0, carbs: 0, fibre: 0, vitamin_d: 0, iron: 0, zinc: 0, magnesium: 0, b12: 0, calcium: 0, potassium: 0 });

  const gaps   = getGaps(running, targets);
  const calPct = targets.cal > 0 ? Math.round(running.cal / targets.cal * 100) : 0;
  const goal   = { fuel:'Performance', muscle:'Build Muscle', fat:'Lose Fat', recomp:'Recomposition' }[state.profile.goal];
  const dateLabel = new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });

      <h2 style="font-size:26px;font-weight:600;letter-spacing:-.03em;line-height:1.2">Check my gaps</h2>
      <p style="font-size:13px;color:var(--subtle);margin-top:4px">${dateLabel}</p>
    </div>

    <!-- Running totals vs targets -->
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="label" style="margin-bottom:0">Today so far</div>
        <div class="mono" style="font-size:11px;color:${calPct > 105 ? '#dc2626' : calPct > 80 ? '#d97706' : 'var(--muted)'}">${calPct}% of target · ${goal}</div>
      </div>
      ${clickableTrackerBar('cal',     'Calories', running.cal,     targets.cal,     '#374151',       ' kcal', getMacroContributors(todayLogs, 'cal'))}
      ${clickableTrackerBar('protein', 'Protein',  running.protein, targets.protein, 'var(--protein)', 'g',     getMacroContributors(todayLogs, 'protein'))}
      ${clickableTrackerBar('carbs',   'Carbs',    running.carbs,   targets.carbs,   'var(--carbs)',   'g',     getMacroContributors(todayLogs, 'carbs'))}
      ${clickableTrackerBar('fat', 'Fat', running.fat, targets.fat, 'var(--fat)', 'g', [])}
      ${state.gapsExpandedMacro === 'fat' ? `
      <div style="margin-top:-6px;margin-bottom:14px;padding:10px 12px;background:#fffbeb;border:1px solid #fde68a;border-radius:10px">
        <div class="mono" style="font-size:10px;color:var(--muted);letter-spacing:.08em;margin-bottom:8px">FAT BREAKDOWN — tap a type to see sources</div>
        ${fatSubtypeRow('sat',  'Saturated',      running.sat_fat,  running.fat, '#dc2626', todayLogs)}
        ${fatSubtypeRow('mono', 'Monounsaturated', running.mono_fat, running.fat, '#16a34a', todayLogs)}
        ${fatSubtypeRow('poly', 'Polyunsaturated', running.poly_fat, running.fat, '#0284c7', todayLogs)}
        ${running.sat_fat === 0 && running.mono_fat === 0 && running.poly_fat === 0 ? `<div style="font-size:12px;color:var(--muted);font-style:italic">No fat subtype data yet — analyse more meals to see breakdown.</div>` : ''}

      ${clickableTrackerBar('fibre',   'Fibre',    running.fibre,   targets.fibre,   'var(--fibre)',   'g',     getMacroContributors(todayLogs, 'fibre'))}

    <div class="card" style="margin-bottom:12px">
      <div class="label" style="margin-bottom:2px">What you should eat</div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:16px;font-style:italic">${todayLogs.length} meal${todayLogs.length !== 1 ? 's' : ''} logged · gaps against full daily target</p>

    <!-- Slot-based meal view -->
    ${(() => {
      const slots = [
        { id: 'breakfast', label: 'Breakfast', emoji: '🌅' },
        { id: 'lunch',     label: 'Lunch',     emoji: '☀️' },

        if (logs.length === 0) {

          </div>`;
        }
        return logs.map((log, li) => {
          const idx   = state.mealLogs.indexOf(log);
          const name  = extractShortMealName(log.summary) || (log.meal_data||[]).slice(0,3).map(it=>it.name).join(', ') || s.label;
          const time  = new Date(log.logged_at).toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
          return `
          <div style="display:flex;align-items:stretch;background:white;border:1px solid var(--border);border-radius:12px;margin-bottom:6px;overflow:hidden;box-shadow:var(--shadow)">
            <button onclick="openMealLog(${idx})" style="flex:1;display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer;text-align:left;background:none;border:none;min-width:0">
              ${log.photo_data_url ? `<img src="${log.photo_data_url}" style="width:40px;height:40px;border-radius:8px;object-fit:cover;flex-shrink:0">` : `<span style="font-size:20px;flex-shrink:0;width:40px;text-align:center">${s.emoji}</span>`}
              <div style="flex:1;min-width:0">
                <div style="font-size:12px;font-family:monospace;color:var(--muted);margin-bottom:1px;text-transform:uppercase;letter-spacing:.06em">${s.label}</div>
                <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div>
              </div>
              <div style="text-align:right;flex-shrink:0;margin-right:4px">
                <div style="font-size:12px;font-family:monospace;color:var(--subtle)">${log.totals?.cal || 0} kcal</div>
                <div style="font-size:11px;color:var(--muted)">${time}</div>
              </div>
              <span style="color:#d1d5db;font-size:13px;flex-shrink:0">→</span>
            </button>
            <button onclick="deleteMealLog('${log.id}')" style="padding:0 12px;background:none;border:none;border-left:1px solid var(--border);color:#d1d5db;cursor:pointer;font-size:19px;flex-shrink:0;line-height:1" title="Delete meal">×</button>
          </div>`;
        }).join('');
      }).join('');
      // Untagged meals (logged before slot selector existed)
      const untaggedRows = untagged.map(log => {
        const idx  = state.mealLogs.indexOf(log);
        const name = extractShortMealName(log.summary) || (log.meal_data||[]).slice(0,3).map(it=>it.name).join(', ') || 'Meal';
        const time = new Date(log.logged_at).toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
        return `
        <div style="display:flex;align-items:stretch;background:white;border:1px solid var(--border);border-radius:12px;margin-bottom:6px;overflow:hidden;box-shadow:var(--shadow)">
          <button onclick="openMealLog(${idx})" style="flex:1;display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer;text-align:left;background:none;border:none;min-width:0">
            ${log.photo_data_url ? `<img src="${log.photo_data_url}" style="width:40px;height:40px;border-radius:8px;object-fit:cover;flex-shrink:0">` : `<div style="width:40px;height:40px;border-radius:8px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🍽️</div>`}

              <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px">${name}</div>

            </div>
            <span style="color:#d1d5db;font-size:13px;flex-shrink:0">→</span>
          </button>
          <button onclick="deleteMealLog('${log.id}')" style="padding:0 12px;background:none;border:none;border-left:1px solid var(--border);color:#d1d5db;cursor:pointer;font-size:19px;flex-shrink:0;line-height:1" title="Delete meal">×</button>

      <div style="margin-bottom:12px">

    <button class="btn-primary" onclick="setState({screen:'fuel',fuelPlan:null,fuelError:null})">⚡ Plan the rest of my day →</button>

    <div class="mono" style="margin-top:16px;text-align:center;font-size:11px;color:#d1d5db">Values from USDA FoodData Central · Mifflin-St Jeor BMR</div>

    ${renderTabBar('today')}`;
}

// ─── Main render ──────────────────────────────────────────────────────────────
function render() {
  const screens = {
    loading: renderLoading,
    auth: renderAuth,
    profile: renderProfile, home: renderHome,
    analyse: renderAnalyse, results: renderResults, paywall: renderPaywall,
    fuel: renderFuel, fuelResults: renderFuelResults,
    gaps: renderGaps,
  };
  const fn = screens[state.screen];
  document.getElementById('app').innerHTML = fn ? fn() : '';
  const ta = document.getElementById('meal-text');
  if (ta && state.mealText) ta.value = state.mealText;
}

// ─── Event handlers ───────────────────────────────────────────────────────────
function setSex(sex)           { state.profile.sex           = sex;   render(); }
function setGoal(goal)         { state.profile.goal          = goal;  render(); }
function setActivityLevel(lvl) { state.profile.activityLevel = lvl;   render(); }
function toggleExpand(i) { setState({ expandedIdx: state.expandedIdx === i ? null : i }); }
function toggleAssumptions() { setState({ assumptionsExpanded: !state.assumptionsExpanded }); }

async function handleAuth() {
  const email    = state.authEmail.trim();
  const password = state.authPassword;
  if (!email || !password) { setState({ authError: 'Please enter your email and password.' }); return; }
  setState({ authLoading: true, authError: null });
  try {
    let result;
    if (state.authMode === 'login') {
      result = await sb.auth.signInWithPassword({ email, password });
    } else {
      result = await sb.auth.signUp({ email, password });
    }
    if (result.error) throw result.error;
    // onAuthStateChange will handle routing
  } catch (err) {
    setState({ authLoading: false, authError: err.message || 'Something went wrong. Please try again.' });
  }
}

async function handleSignOut() {
  await sb.auth.signOut();
  setState({ user: null, session: null, screen: 'auth' });
}

async function saveProfile() {
  const w = parseFloat(document.getElementById('p-weight')?.value);
  const h = parseFloat(document.getElementById('p-height')?.value);
  const a = parseInt(document.getElementById('p-age')?.value);
  if (!w || !h || !a) { alert('Please fill in all fields.'); return; }
  // activityLevel and sex/goal are already set directly on state.profile via their buttons
  state.profile.weight = w; state.profile.height = h; state.profile.age = a;
  localStorage.setItem('wise_profile', JSON.stringify(state.profile));
  // Sync to Supabase profiles table so profile persists across devices
  if (state.user) {
    try {
      await sb.from('profiles').upsert({
        id:         state.user.id,
        weight_kg:  w,
        height_cm:  h,
        age:        a,
        sex:        state.profile.sex,
        goal:       state.profile.goal,
        updated_at: new Date().toISOString(),
      }, { onConflict: 'id' });
    } catch(e) {
      console.warn('Profile sync to Supabase failed:', e?.message || e);
      // Not fatal — localStorage copy is the fallback
    }
  }
  setState({ screen: 'home' });
}

function addPhoto(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const urls = [...state.photoDataUrls, ev.target.result].slice(0, 3);
    setState({ photoDataUrls: urls, analysisError: null });
  };
  reader.readAsDataURL(file);
}

function removePhoto(idx) {
  setState({ photoDataUrls: state.photoDataUrls.filter((_, i) => i !== idx) });
}

function startEditIngredient(idx) {
  const item = state.analysisResult.identified[idx];
  setState({ editingIdx: idx, expandedIdx: null, editFetching: false });
  // Pre-fill inputs after render
  setTimeout(() => {
    const n = document.getElementById(`edit-name-${idx}`);
    const g = document.getElementById(`edit-grams-${idx}`);
    if (n) n.value = item.name;
    if (g) g.value = item.estimatedG;
  }, 0);
}

function cancelEditIngredient() {
  setState({ editingIdx: null, editFetching: false });
}

async function saveEditIngredient(idx) {
  const nameEl  = document.getElementById(`edit-name-${idx}`);
  const gramsEl = document.getElementById(`edit-grams-${idx}`);
  const newName  = nameEl?.value?.trim()  || state.analysisResult.identified[idx].name;
  const newGrams = parseInt(gramsEl?.value) || state.analysisResult.identified[idx].estimatedG;
  const item = state.analysisResult.identified[idx];
  const nameChanged = newName.toLowerCase() !== item.name.toLowerCase();

  if (nameChanged) {
    setState({ editFetching: true });
    try {
      const per100data = await fetchPer100(newName);
      const updated = { ...item, name: newName, estimatedG: newGrams,
        emoji: per100data.emoji || item.emoji,
        per100: { cal: per100data.cal||0, protein: per100data.protein||0, fat: per100data.fat||0, carbs: per100data.carbs||0, fibre: per100data.fibre||0 } };
      const identified = state.analysisResult.identified.map((ing, i) => i === idx ? updated : ing);
      setState({ editingIdx: null, editFetching: false, analysisResult: { ...state.analysisResult, identified } });
    } catch(err) {
      // Fallback: update name/grams, keep existing per100
      const updated = { ...item, name: newName, estimatedG: newGrams };
      const identified = state.analysisResult.identified.map((ing, i) => i === idx ? updated : ing);
      setState({ editingIdx: null, editFetching: false, analysisResult: { ...state.analysisResult, identified } });
    }
  } else {
    const updated = { ...item, estimatedG: newGrams };
    const identified = state.analysisResult.identified.map((ing, i) => i === idx ? updated : ing);
    setState({ editingIdx: null, analysisResult: { ...state.analysisResult, identified } });
  }
}

function openMealLog(idx) {
  const log = state.mealLogs[idx];
  if (!log) return;
  // Reconstruct the analysisResult shape from the log
  const result = {
    identified:     log.meal_data || [],
    assumptions:    [],
    confidence:     log.confidence_note || 'Medium',
    confidenceNote: log.confidence_note || '',
    summary:        log.summary || '',
    ambiguous:      false,
  };
  setState({
    viewingLog:     log,
    analysisResult: result,
    analyseTab:     log.input_type || 'text',
    photoDataUrls:  log.photo_data_url ? [log.photo_data_url] : [],
    mealContext:    log.meal_context || null,
    restaurantName: log.restaurant_name ? log.restaurant_name.replace(/\s*\(.*\)$/, '') : '',
    restaurantLocation: log.restaurant_name ? (log.restaurant_name.match(/\(([^)]+)\)$/)?.[1] || '') : '',
    assumptionsExpanded: false,
    expandedIdx:    null,
    editingIdx:     null,
    screen:         'results',
  });
}

function deleteIngredient(idx) {
  const identified = state.analysisResult.identified.filter((_, i) => i !== idx);
  setState({ analysisResult: { ...state.analysisResult, identified }, expandedIdx: null, editingIdx: null });
}

function saveCorrectedIngredients() {
  const identified = state.analysisResult.identified.map((item, i) => {
    const nameEl  = document.getElementById(`corr-name-${i}`);
    const gramsEl = document.getElementById(`corr-grams-${i}`);
    const newName  = nameEl  ? (nameEl.value.trim()  || item.name)       : item.name;
    const newGrams = gramsEl ? (parseInt(gramsEl.value) || item.estimatedG) : item.estimatedG;
    return { ...item, name: newName, estimatedG: newGrams };
  });
  setState({
    analysisResult: { ...state.analysisResult, identified },
    ingredientsVerified: 'yes',
    ingredientsExpanded: false,
    expandedIdx: null,
    editingIdx: null,
  });
}

function deleteCorrIngredient(idx) {
  // Collect any edits already made before removing the row
  const identified = state.analysisResult.identified.map((item, i) => {
    const nameEl  = document.getElementById(`corr-name-${i}`);
    const gramsEl = document.getElementById(`corr-grams-${i}`);
    if (!nameEl) return item;
    return { ...item, name: nameEl.value.trim() || item.name, estimatedG: parseInt(gramsEl?.value) || item.estimatedG };
  }).filter((_, i) => i !== idx);
  setState({ analysisResult: { ...state.analysisResult, identified } });
}

function addCorrIngredient() {
  // Preserve any edits already in the DOM before appending
  const identified = state.analysisResult.identified.map((item, i) => {
    const nameEl  = document.getElementById(`corr-name-${i}`);
    const gramsEl = document.getElementById(`corr-grams-${i}`);
    if (!nameEl) return item;
    return { ...item, name: nameEl.value.trim() || item.name, estimatedG: parseInt(gramsEl?.value) || item.estimatedG };
  });
  identified.push({ name: '', emoji: '🍽️', estimatedG: 100, confidence: 'Medium', reasoning: 'Added manually', per100: { cal: 0, protein: 0, fat: 0, carbs: 0, fibre: 0 } });
  setState({ analysisResult: { ...state.analysisResult, identified } });
  // Focus the new name input after render
  setTimeout(() => {
    const el = document.getElementById(`corr-name-${identified.length - 1}`);
    if (el) { el.focus(); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
  }, 50);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
render(); // show loading spinner immediately

sb.auth.onAuthStateChange(async (event, session) => {
  if (session) {
    let profile = JSON.parse(localStorage.getItem('wise_profile') || 'null');

    // If no local profile, try loading from Supabase (e.g. new device / cleared storage)
    if (!profile) {
      try {
        const { data } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
        if (data && data.weight_kg && data.height_cm && data.age) {
          profile = { weight: data.weight_kg, height: data.height_cm, age: data.age, sex: data.sex || 'male', goal: data.goal || 'fuel' };
          localStorage.setItem('wise_profile', JSON.stringify(profile));
          state.profile = profile;
        }
      } catch(e) {
        console.warn('Could not load profile from Supabase:', e?.message || e);
      }
    }

    const nextScreen = profile ? 'home' : 'profile';
    // Restore the last screen if the tab was backgrounded and reloaded
    const restoreScreen = savedSession?.screen;
    const canRestore = savedSession && restoreScreen
      && !['loading','auth'].includes(restoreScreen)
      && profile; // can't restore if profile setup isn't done
    if (canRestore) {
      Object.assign(state, savedSession);
      state.user    = session.user;
      state.session = session;
      state.authLoading = false;
      render();
    } else {
      setState({ user: session.user, session, authLoading: false, screen: nextScreen });
    }
    loadMealLogs();
  } else {
    try { localStorage.removeItem('wise_session'); } catch(e) {}
    setState({ user: null, session: null, authLoading: false, screen: 'auth', mealLogs: [] });
  }
});
</script>
</body>
