const SUPABASE_URL  = 'https://qpisyykqmivljpsqleul.supabase.co';

  gapsExpandedFatSubtype: null, // 'sat' | 'mono' | 'poly' | null — second level inside fat bar
  pwFeature: null,
  assumptionsExpanded: false,

function setState(patch) {
  // Reset ingredient verification when navigating away from results screen
  if (patch.screen && patch.screen !== 'results') {
    if (!('ingredientsVerified' in patch)) patch.ingredientsVerified = null;
    if (!('ingredientsExpanded' in patch)) patch.ingredientsExpanded = false;
  }
  Object.assign(state, patch);
  saveSessionState();
  render();
}

function saveSessionState() {
  try {
    // Only save lightweight navigation context — NOT analysisResult or viewingLog.
    // Those objects (full ingredient JSON + photo_data_url) can exceed the ~5MB
    // localStorage quota, causing setItem to throw. The catch block would silently
    // swallow the error, leaving a stale savedSession that routes to home on reload.
    // Results are already in Supabase; the analyse form fields are what matters.
    //
    // Screens that depend on large in-memory objects (results, ambiguousResult)
    // restore as 'home' — the user can re-navigate from there.
    const restorableScreen = ['home','gaps','profile','analyse','fuel','fuelResults'].includes(state.screen)
      ? state.screen : 'home';
    localStorage.setItem('wise_session', JSON.stringify({
      screen:           restorableScreen,
      analyseTab:       state.analyseTab,
      mealText:         state.mealText,
      mealContext:      state.mealContext,
      mealSlot:         state.mealSlot,
      mealDate:         state.mealDate,
      restaurantName:   state.restaurantName,
      restaurantLocation: state.restaurantLocation,
      photoDescription: state.photoDescription,
      fuelActivity:     state.fuelActivity,
      fuelEffort:       state.fuelEffort,
      fuelWhen:         state.fuelWhen,
      fuelMeals:        state.fuelMeals,
    }));
  } catch(e) {}
}

// ─── Nutrition helpers ────────────────────────────────────────────────────────
function calcBMR(p) {
  return Math.round(10 * p.weight + 6.25 * p.height - 5 * p.age + (p.sex === 'male' ? 5 : -161));
}
function calcTargets(p) {
  const bmr     = calcBMR(p);
  const actMult = { sedentary: 1.2, light: 1.375, moderate: 1.55 }[p.activityLevel] || 1.55;
  const tdee    = Math.round(bmr * actMult);
  const adj     = p.goal === 'fat' ? Math.round(tdee * 0.85) : p.goal === 'muscle' ? Math.round(tdee * 1.10) : tdee;
  const protG = Math.round(p.weight * (p.goal === 'fat' ? 2.2 : p.goal === 'muscle' ? 2.0 : p.goal === 'recomp' ? 2.3 : 1.8));
  const fatG  = Math.round((adj * (p.goal === 'fat' ? 0.30 : 0.25)) / 9);
  const carbG = Math.round(Math.max((adj - protG * 4 - fatG * 9) / 4, 50));
  return { cal: adj, protein: protG, fat: fatG, carbs: carbG, fibre: 30 };
}
function totalsFrom(items) {
  return items.reduce((a, item) => {
    const m = item.estimatedG / 100, n = item.per100 || {};
    return {
      cal:      Math.round(a.cal      + (n.cal      || 0) * m),
      protein:  +((a.protein  + (n.protein  || 0) * m).toFixed(1)),
      fat:      +((a.fat      + (n.fat      || 0) * m).toFixed(1)),
      sat_fat:  +((a.sat_fat  + (n.sat_fat  || 0) * m).toFixed(1)),
      poly_fat: +((a.poly_fat + (n.poly_fat || 0) * m).toFixed(1)),
      mono_fat: +((a.mono_fat + (n.mono_fat || 0) * m).toFixed(1)),
      carbs:     +((a.carbs     + (n.carbs     || 0) * m).toFixed(1)),
      fibre:     +((a.fibre     + (n.fibre     || 0) * m).toFixed(1)),
      vitamin_d: +((a.vitamin_d + (n.vitamin_d || 0) * m).toFixed(2)),
      iron:      +((a.iron      + (n.iron      || 0) * m).toFixed(2)),
      zinc:      +((a.zinc      + (n.zinc      || 0) * m).toFixed(2)),
      magnesium: +((a.magnesium + (n.magnesium || 0) * m).toFixed(1)),
      b12:       +((a.b12       + (n.b12       || 0) * m).toFixed(2)),
      calcium:   +((a.calcium   + (n.calcium   || 0) * m).toFixed(1)),
      potassium: +((a.potassium + (n.potassium || 0) * m).toFixed(1)),
    };
  }, { cal: 0, protein: 0, fat: 0, sat_fat: 0, poly_fat: 0, mono_fat: 0, carbs: 0, fibre: 0, vitamin_d: 0, iron: 0, zinc: 0, magnesium: 0, b12: 0, calcium: 0, potassium: 0 });
}
function getGaps(totals, targets) {
  const recs = [];
  const pg = targets.protein - totals.protein;
  const cg = targets.carbs   - totals.carbs;
  const fig= targets.fibre   - totals.fibre;
  const fg = targets.fat     - totals.fat;
  if (pg  > 10) recs.push({ label: 'Protein Gap', impact: 'HIGH',              text: `Need ~${Math.round(pg)}g more protein — chicken breast, eggs, Greek yogurt or a protein shake would all help.` });
  if (cg  > 20) recs.push({ label: 'Carb Gap',    impact: cg > 50 ? 'HIGH' : 'MEDIUM', text: `Need ~${Math.round(cg)}g more carbs — sweet potato, rice, oats or a banana are good options.` });
  if (fig >  5) recs.push({ label: 'Fibre Gap',   impact: 'MEDIUM',            text: `Need ~${Math.round(fig)}g more fibre — broccoli, chia seeds, lentils or an apple would do it.` });
  if (fg  >  8) recs.push({ label: 'Fat Gap',     impact: 'LOW',               text: `Need ~${Math.round(fg)}g more healthy fat — avocado, walnuts, olive oil or salmon are good sources.` });
  if (!recs.length) recs.push({ label: 'On Track', impact: 'GOOD',             text: 'Macros are well balanced for your goal. Nice work.' });
  return recs;
}

// ─── Image compression ────────────────────────────────────────────────────────
function compressImage(dataUrl, maxSize = 768, quality = 0.8) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const ratio = Math.min(maxSize / img.width, maxSize / img.height, 1);
      const canvas = document.createElement('canvas');
      canvas.width  = Math.round(img.width  * ratio);
      canvas.height = Math.round(img.height * ratio);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = dataUrl;
  });
}

async function saveMealLog(result) {
  if (!state.user) return;
  const totals = totalsFrom(result.identified || []);
  const photo  = state.analyseTab === 'photo' && state.photoDataUrls.length > 0
    ? state.photoDataUrls[0] : null;
  try {
    // Build logged_at: use mealDate (YYYY-MM-DD) + current time, so backdated meals
    // land on the right calendar day but preserve a meaningful timestamp within that day.
    const loggedAt = (() => {
      const today = new Date().toISOString().split('T')[0];
      if (!state.mealDate || state.mealDate === today) return new Date().toISOString();
      // Backdated: use noon on the chosen date to avoid timezone edge cases
      return new Date(state.mealDate + 'T12:00:00').toISOString();
    })();

    const { error } = await sb.from('meal_logs').insert({
      user_id:         state.user.id,
      input_type:      state.analyseTab,
      meal_context:    state.mealContext,
      restaurant_name: buildRestaurantLabel({ name: state.restaurantName, location: state.restaurantLocation }) || null,
      meal_data:       result.identified || [],
      confidence_note: result.confidenceNote || result.confidence || null,
      summary:         result.summary || null,
      photo_data_url:  photo,
      totals:          { cal: totals.cal, protein: totals.protein, fat: totals.fat, sat_fat: totals.sat_fat, poly_fat: totals.poly_fat, mono_fat: totals.mono_fat, carbs: totals.carbs, fibre: totals.fibre, vitamin_d: totals.vitamin_d, iron: totals.iron, zinc: totals.zinc, magnesium: totals.magnesium, b12: totals.b12, calcium: totals.calcium, potassium: totals.potassium },
      context:         state.mealSlot ? { slot: state.mealSlot } : null,
      logged_at:       loggedAt,
    });
    if (error) throw error;
    loadMealLogs(); // refresh home screen list without awaiting
  } catch(e) {
    console.warn('saveMealLog failed:', e?.message || e);
    setState({ mealSaveError: e?.message || 'Meal could not be saved.' });
  }
}

async function loadMealLogs() {
  if (!state.user) return;
  setState({ mealLogsLoading: true });
  try {
    const { data, error } = await sb
      .from('meal_logs')
      .select('*')
      .eq('user_id', state.user.id)   // explicit filter — required for some RLS configs
      .order('logged_at', { ascending: false })
      .limit(30);
    if (error) throw error;
    setState({ mealLogs: data || [], mealLogsLoading: false });
  } catch(e) {
    console.warn('loadMealLogs failed:', e?.message || e);
    setState({ mealLogsLoading: false });
  }
}

async function deleteMealLog(id) {
  if (!confirm('Delete this meal?')) return;
  try {
    const { error } = await sb.from('meal_logs').delete().eq('id', id);
    if (error) throw error;
    // If currently viewing this log, go back home
    if (state.viewingLog && state.viewingLog.id === id) {
      setState({ screen: 'home', viewingLog: null, analysisResult: null });
    }
    await loadMealLogs();
    if (state.screen === 'gaps') render(); // refresh gaps screen
  } catch(e) {
    alert('Could not delete meal: ' + (e.message || e));
  }
}

const SCHEMA = `{
  "ambiguous": false,
  "ambiguityReason": "Only populate if ambiguous is true — one plain sentence e.g. 'This is a blended smoothie — individual ingredients cannot be identified once mixed'",
  "summary": "One plain sentence describing what this meal appears to be, e.g. 'This looks like a roasted chicken dinner with vegetables and potato salad.' Always starts with 'This looks like'.",
  "identified": [
    {
      "name": "Food name",
      "emoji": "appropriate single emoji",
      "estimatedG": 100,
      "confidence": "High | Medium | Low",
      "reasoning": "Specific visual or contextual reasoning for this identification and gram estimate",
      "per100": { "cal": 0, "protein": 0, "fat": 0, "sat_fat": 0, "poly_fat": 0, "mono_fat": 0, "carbs": 0, "fibre": 0, "vitamin_d": 0, "iron": 0, "zinc": 0, "magnesium": 0, "b12": 0, "calcium": 0, "potassium": 0 }
    }
  ],
  "assumptions": ["Each assumption made, stated plainly"],
  "confidence": "High | Medium | Low",
  "confidenceNote": "One sentence on the main source of uncertainty"
}`;

const BASE_PROMPT = `You are WISE — What I Should Eat — a nutrition analysis AI.
Identify every ingredient in this meal, estimate portion sizes in grams, and provide accurate nutritional values per 100g using USDA FoodData Central data.

Return ONLY valid raw JSON matching this exact schema (no markdown, no code fences, no explanation):
${SCHEMA}

Rules:
- List every visible ingredient separately, including sauces, oils, seeds, toppings
- Use standard portion sizes when amounts are unclear (1 tbsp honey = 21g, 1 medium banana = 118g)
- Per100 values must be accurate USDA data per 100g
- Confidence reflects certainty about both identification AND portion estimate
- Reasoning must reference specific visual cues: colour, texture, shape, plate coverage
- Be honest — if you cannot identify something, say so
- AMBIGUITY RULE: Only applies to photo analysis. Set "ambiguous": true when individual ingredients cannot be reliably identified from the photo. This includes: blended drinks (smoothies, shakes, juices), soups, curries, stews, dal, sauces where composition is unknown (white sauce = cream? yogurt? béchamel?), pies or pastries with hidden fillings, sandwiches/wraps where interior is not visible, and any dish where macro estimates would be unreliable. When ambiguous is true, set "identified": [] and write a specific one-sentence ambiguityReason explaining exactly what makes this photo unanalysable. If the user has provided a text description of the meal, NEVER set ambiguous: true — analyse what they have described.
- MILK ALTERNATIVES IN COFFEE: When a milk alternative (oat milk, coconut milk, almond milk, soy milk) is used in a coffee drink (flat white, latte, cappuccino, cortado), always use barista-grade nutritional values — these are heavily diluted (~10–15% coconut or oat content) and have ~30–50 kcal and 1–4g fat per 100ml. Do NOT use cooking/tinned coconut milk values (which are ~180 kcal and 17–19g fat per 100ml). A coconut milk flat white or oat milk latte contains barista milk, not cooking milk.
- MICRONUTRIENTS: For every ingredient's per100 object, populate all 7 micronutrient fields using USDA FoodData Central data: vitamin_d (µg/100g), iron (mg/100g), zinc (mg/100g), magnesium (mg/100g), b12 (µg/100g), calcium (mg/100g), potassium (mg/100g). These are required — do not omit or leave as 0 unless the food genuinely contains none. Use 0 only if the nutrient is truly absent (e.g. b12 in plant foods).`;

function extractJSON(text) {
  let clean = String(text).trim()
    .replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/```\s*$/i, '').trim();
  try { return JSON.parse(clean); } catch(e) {}
  const m = clean.match(/\{[\s\S]*\}/);
  if (m) { try { return JSON.parse(m[0]); } catch(e) {} }
  throw new Error('Could not parse response. Please try again.');
}

function buildAnalysisPrompt(context) {
  let ctx = '';
  if (context?.type === 'home') {
    ctx = '\nCONTEXT: Home-cooked meal. Use standard home-cooking portion sizes and typical oil/seasoning amounts.';
  } else if (context?.type === 'eating_out' || context?.type === 'restaurant') {
    const namePart = context.name ? ` at "${context.name}"` : '';
    const locPart  = context.location ? ` (${context.location})` : '';
    const ident    = context.name ? `"${context.name}"${locPart}` : null;
    const dataNote = ident
      ? ` If ${ident} is a known chain with published nutritional data, use those figures and explicitly state in the summary and assumptions what data source you used (e.g. "Used ${context.name} published nutritional data" or "No specific data found for ${context.name} — assumed higher fat and sodium typical of eating out"). Location context: ${context.location || 'not specified'} — use this to disambiguate between regional chains (e.g. Nando's UK vs US portion sizes).`
      : '';
    ctx = `\nCONTEXT: Restaurant or café meal${namePart}${locPart}.${dataNote} Eating out typically means more oil, butter, and salt — and larger portions than home cooking. Adjust estimates accordingly.`;
  } else if (context?.type === 'shop_bought') {
    ctx = '\nCONTEXT: Shop-bought or packaged food. Use standard manufacturer nutritional data for known branded products where available (supermarket ready meals, branded snacks, etc.). Note in assumptions if you used manufacturer data or estimated from first principles.';
  }
  return BASE_PROMPT + ctx + '\n\nAnalyse this food. Identify every ingredient, estimate gram portions, and return the JSON.';
}

async function fetchPieceData(name) {
  // Asks the edge function for "1 [name]" to get per-piece gram weight + per100 nutrition.
  // e.g. "1 egg" → estimatedG ≈ 50g, plus per100 nutrition values for egg.
  const token = await getToken();
  const res = await fetch(`${SUPABASE_URL}/functions/v1/wise-analyse`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'text', description: `1 ${name}`, context: null }),
  });
  if (!res.ok) throw new Error(`Lookup failed for ${name}`);
  const text = await res.text();
  let result;
  try { result = JSON.parse(text); } catch(_) { result = extractJSON(text); }
  const item = result?.identified?.[0];
  if (item?.per100 && item?.estimatedG) {
    return { ...item.per100, emoji: item.emoji || '🍽️', gramsPerPiece: item.estimatedG };
  }
  throw new Error(`No piece data for ${name}`);
}

async function fetchPer100(name) {
  // Use wise-analyse edge function with a text description to get per100 data.
  // callAnalyse uses res.json() which fails if the edge function returns JSON + trailing text.
  // We fetch manually here so we can run the response through extractJSON as a fallback.
  const token = await getToken();
  const res = await fetch(`${SUPABASE_URL}/functions/v1/wise-analyse`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'text', description: `100g ${name}`, context: null }),
  });
  if (!res.ok) throw new Error(`Lookup failed for ${name}`);
  // Try clean JSON first; fall back to extractJSON if there's trailing content
  const text = await res.text();
  let result;
  try { result = JSON.parse(text); }
  catch(_) { result = extractJSON(text); }
  const item = result?.identified?.[0];
  if (item?.per100) return { ...item.per100, emoji: item.emoji || '🍽️' };
  throw new Error(`No nutritional data returned for ${name}`);
}

function buildRestaurantLabel(context) {
  // Combines name + location into a single string for the edge function.
  // e.g. "Nando's (London)" or just "Din Tai Fung" — Claude understands location context inline.
  if (!context?.name && !context?.location) return null;
  const parts = [context.name, context.location ? `(${context.location})` : null].filter(Boolean);
  return parts.join(' ') || null;
}

async function analysePhoto(dataUrls, context, userNote) {
  const compressed = await Promise.all(dataUrls.map(u => compressImage(u, 768, 0.8)));
  return callAnalyse({
    type: 'photo',
    images: compressed,
    context: context?.type || null,
    restaurantName: buildRestaurantLabel(context),
    userNote: userNote || null,
  });
}

async function analyseText(description, context) {
  return callAnalyse({
    type: 'text',
    description,
    context: context?.type || null,
    restaurantName: buildRestaurantLabel(context),
  });
}

async function runAnalysis() {
  // Sync textarea value from DOM — avoids the stale-state bug where
  // state.mealText was set via direct mutation but button never re-rendered
  const textareaEl = document.getElementById('meal-text');
  if (textareaEl) state.mealText = textareaEl.value;

  // Validate before showing loading
  if (state.analyseTab === 'photo' && state.photoDataUrls.length === 0) {
    setState({ analysisError: 'Please upload at least one photo first.' });
    return;
  }
  if (state.analyseTab === 'text' && !state.mealText.trim()) {
    setState({ analysisError: 'Please describe your meal before analysing.' });
    return;
  }
  if (!state.mealSlot) {
    setState({ analysisError: 'Please select which meal this is — Breakfast, Lunch, Dinner, or Snack.' });
    return;
  }
  if (!state.mealContext) {
    setState({ analysisError: 'Please select where this meal is from — Home cooked, Eating out, or Shop bought.' });
    return;
  }

  setState({ analysing: true, analysisError: null, analysisResult: null });
  try {
    const isEatingOut = state.mealContext === 'eating_out' || state.mealContext === 'restaurant';
    const context = state.mealContext
      ? { type: state.mealContext, name: isEatingOut ? state.restaurantName.trim() : null, location: isEatingOut ? state.restaurantLocation.trim() : null }
      : null;
    let result;
    if (state.analyseTab === 'photo') {
      result = await analysePhoto(state.photoDataUrls, context, state.photoDescription.trim() || null);
    } else {
      result = await analyseText(state.mealText.trim(), context);
    }
    // If the model returned no ingredients (can happen with blended drinks / minimal photos),
    // treat as ambiguous so the user gets a useful handoff screen rather than all-zero numbers.
    if (!result.ambiguous && (!result.identified || result.identified.length === 0)) {
      result.ambiguous = true;
      result.ambiguityReason = result.ambiguityReason || 'WISE could not identify individual ingredients — this is often a blended drink, a very plain food, or an unclear photo. Try adding a description or entering ingredients manually.';
    }
    await saveMealLog(result);
    setState({ analysing: false, analysisResult: result, screen: result.ambiguous ? 'ambiguousResult' : 'results' });
  } catch (err) {
    console.error(err);
    setState({ analysing: false, analysisError: err.message || 'Analysis failed. Please try again.' });
  }
}

// ─── Fuel planner ────────────────────────────────────────────────────────────
function calcAdjustedTargets(profile, activity, effort) {
  const base = calcTargets(profile);
  if (activity === 'rest') return base;
  const bonus = { light: 200, moderate: 400, hard: 650 }[effort] || 0;
  const mixedExtra = activity === 'mixed' ? Math.round(bonus * 0.15) : 0;
  const totalBonus = bonus + mixedExtra;
  const extraCarbs = Math.round(totalBonus / 4);
  return { ...base, cal: base.cal + totalBonus, carbs: base.carbs + extraCarbs };
}

function buildFuelPrompt(profile, targets, activity, effort, when, meals) {
  const isRest = activity === 'rest';
  const goalLabel = { fuel: 'Performance — maximise training output', muscle: 'Build Muscle — 10% calorie surplus', fat: 'Lose Fat — 15% deficit', recomp: 'Recomposition — maintenance + high protein' }[profile.goal];
  const activityDesc = isRest ? 'Rest day — no training' : `${effort.charAt(0).toUpperCase() + effort.slice(1)} ${activity} session, training time: ${when}`;

  const schema = `{
  "dayType": "One-line description e.g. Hard Strength Day — Afternoon Session",
  "meals": [
    {
      "slot": "Meal name e.g. Breakfast / Pre-Training / Post-Training / Lunch / Dinner / Snack",
      "timing": "When to eat e.g. 7:00 AM / 2 hours before training / Within 90 minutes of finishing",
      "purpose": "One sentence — why this meal is structured this way for the goal and training",
      "ingredients": [
        { "name": "Ingredient", "amount": "e.g. 150g / 2 large / 1 medium", "emoji": "🍗", "note": "optional brief reason" }
      ],

    }
  ],

}`;

  return [{ role: 'user', content: `You are WISE — What I Should Eat — a performance nutrition AI.
Build a precise ingredient-level fuel plan for this person's day.

PROFILE:
- Weight: ${profile.weight}kg  Height: ${profile.height}cm  Age: ${profile.age}  Sex: ${profile.sex}
- Goal: ${goalLabel}

TODAY'S ADJUSTED DAILY TARGETS:
- Calories: ${targets.cal} kcal
- Protein: ${targets.protein}g
- Carbs: ${targets.carbs}g
- Fat: ${targets.fat}g
- Fibre: ${targets.fibre}g

TODAY'S TRAINING: ${activityDesc}

RULES:
- Return ONLY valid raw JSON matching the schema (no markdown, no code fences)
- Ingredients must be specific with gram/unit amounts — no vague suggestions, no recipes
- ${isRest ? 'Rest day: 3–4 balanced meals, distribute macros evenly, keep carbs moderate' : `Training day: build meals around the ${when} training window. Pre-training: carb-forward, moderate protein, minimal fat. Post-training: fast protein + carbs within 90 min, low fat. Other meals fill remaining targets.`}
- Create exactly ${meals} meals (the user has requested ${meals} meals today) — no more, no fewer
- Total mealMacros across all meals must sum to within 5% of daily targets
- Use common, accessible whole foods
- dayNotes: max 3 items, specific and actionable (e.g. timing, hydration, key food swaps)
- ${profile.goal === 'recomp' ? 'Recomp goal: protein must be spread across every meal, not front-loaded' : ''}

SCHEMA:
${schema}` }];
}

async function generateFuelPlan() {
  setState({ fuelPlanning: true, fuelError: null, fuelPlan: null });
  try {
    const targets = calcAdjustedTargets(state.profile, state.fuelActivity, state.fuelEffort);

    // Calculate what has already been consumed today
    const todayStr  = new Date().toDateString();
    const todayLogs = state.mealLogs.filter(log => log.logged_at && new Date(log.logged_at).toDateString() === todayStr);
    const consumed  = todayLogs.reduce((acc, log) => {
      const t = log.totals || {};
      return {
        cal:     Math.round(acc.cal     + (t.cal     || 0)),
        protein: +((acc.protein + (t.protein || 0)).toFixed(1)),
        fat:     +((acc.fat     + (t.fat     || 0)).toFixed(1)),
        carbs:   +((acc.carbs   + (t.carbs   || 0)).toFixed(1)),
        fibre:   +((acc.fibre   + (t.fibre   || 0)).toFixed(1)),
      };
    }, { cal: 0, protein: 0, fat: 0, carbs: 0, fibre: 0 });

    // Extract which meal slots have already been logged today
    const loggedSlots = [...new Set(todayLogs.map(l => l.context?.slot).filter(Boolean))];

    const plan = await callFuel({
      profile: { ...state.profile, weight_kg: state.profile.weight, height_cm: state.profile.height },
      targets,
      activity: state.fuelActivity,
      effort: state.fuelEffort,
      when: state.fuelWhen,
      meals: state.fuelMeals,
      consumed: { ...consumed, mealsLogged: todayLogs.length, loggedSlots },
    });
    plan._targets  = targets;
    plan._consumed = consumed;
    setState({ fuelPlanning: false, fuelPlan: plan, screen: 'fuelResults' });
  } catch (err) {
    console.error(err);
    setState({ fuelPlanning: false, fuelError: err.message || 'Failed to generate plan. Please try again.' });
  }
}

function macroBar(label, value, target, color) {
  const pct = Math.min((value / target) * 100, 100);
  const col = value > target * 1.05 ? '#dc2626' : color;
  return `
    <div class="macro-bar-row">
      <div class="macro-bar-row-head">
        <span class="mono" style="color:var(--subtle);font-size:12px;text-transform:uppercase;letter-spacing:.08em">${label}</span>
        <span class="mono" style="font-size:13px"><span style="color:${col};font-weight:700">${value}g</span><span style="color:#d1d5db"> / ${target}g</span></span>
      </div>
      <div class="macro-bar-track"><div class="macro-bar-fill" style="width:${pct}%;background:${col}"></div></div>
    </div>`;
}

function confBadge(c) {
  const cls = c === 'High' ? 'high' : c === 'Medium' ? 'medium' : 'low';
  return `<span class="badge badge-${cls}">${c}</span>`;
}

function macroTile(label, value, target, color, bg) {
  const pct    = Math.round(Math.min(value / target * 100, 999));
  const barPct = Math.min(value / target * 100, 100);
  const over   = value > target * 1.05;
  const col    = over ? '#dc2626' : color;
  return `
    <div style="background:${over ? '#fef2f2' : bg};border-radius:12px;padding:10px 8px;text-align:center;border:1px solid ${over ? '#fecaca' : 'transparent'}">
      <div style="font-size:17px;font-weight:700;color:${col};letter-spacing:-.02em;line-height:1">${value}g</div>
      <div style="font-size:9px;color:${col};font-family:monospace;text-transform:uppercase;letter-spacing:.08em;margin:3px 0 6px;opacity:.8">${label}</div>
      <div style="height:3px;background:rgba(0,0,0,0.08);border-radius:99px;margin-bottom:5px">
        <div style="height:100%;width:${barPct}%;background:${col};border-radius:99px"></div>
      </div>
      <div style="font-size:10px;color:${col};font-family:monospace;opacity:.75">${pct}% daily</div>
    </div>`;
}


// ─── Fuel results helpers ─────────────────────────────────────────────────────
function renderFuelTargetsBreakdown(t) {
  if (!state.fuelTargetsExpanded) return '';
  const p = state.profile;
  const bmr     = calcBMR(p);
  const actMult = { sedentary: 1.2, light: 1.375, moderate: 1.55 }[p.activityLevel] || 1.55;
  const actName = { sedentary: 'sedentary ×1.2', light: 'lightly active ×1.375', moderate: 'moderately active ×1.55' }[p.activityLevel] || 'moderately active ×1.55';
  const tdee    = Math.round(bmr * actMult);
  const goalAdj = p.goal === 'fat' ? -Math.round(tdee * 0.15) : p.goal === 'muscle' ? Math.round(tdee * 0.10) : 0;
  const goalLabel = p.goal === 'fat' ? 'Fat loss deficit (−15%)' : p.goal === 'muscle' ? 'Muscle gain surplus (+10%)' : p.goal === 'recomp' ? 'Recomp — maintenance calories' : 'Performance — maintenance calories';
  const isRest = state.fuelActivity === 'rest';
  const actBonus = isRest ? 0 : ({ light: 200, moderate: 400, hard: 650 }[state.fuelEffort] || 0);
  const mixedExtra = state.fuelActivity === 'mixed' ? Math.round(actBonus * 0.15) : 0;
  const totalBonus = actBonus + mixedExtra;
  const rows = [
    ['BMR — your body at rest', `${bmr} kcal`, '#374151'],
    [`Daily activity (${actName})`, `+${tdee - bmr} kcal`, '#6b7280'],
    ...(goalAdj !== 0 ? [[goalLabel, `${goalAdj > 0 ? '+' : ''}${goalAdj} kcal`, goalAdj > 0 ? '#16a34a' : '#d97706']] : []),
    ...(totalBonus > 0 ? [[`Today's ${state.fuelEffort} ${state.fuelActivity} session`, `+${totalBonus} kcal`, '#3b82f6']] : []),
  ];

  // Macro derivation workings
  const proteinPerKg = { performance: 1.8, muscle: 2.0, fat: 2.2, recomp: 2.3 }[p.goal] || 1.8;
  const goalProteinLabel = { performance: 'performance', muscle: 'muscle gain', fat: 'fat loss', recomp: 'recomp' }[p.goal] || p.goal;
  const fatPct = p.goal === 'fat' ? 30 : 25;
  const proteinKcal = Math.round(t.protein * 4);
  const fatKcal = Math.round(t.fat * 9);
  const carbKcal = t.cal - proteinKcal - fatKcal;

  const macroRows = [
    {
      label: 'Protein', color: 'var(--protein)', grams: t.protein,
      formula: `${p.weight}kg × ${proteinPerKg}g/kg (${goalProteinLabel} target)`,
    },
    {
      label: 'Fat', color: 'var(--fat)', grams: t.fat,
      formula: `${fatPct}% of ${t.cal} kcal = ${fatKcal} kcal ÷ 9`,
    },
    {
      label: 'Carbs', color: 'var(--carbs)', grams: t.carbs,
      formula: `Remaining ${carbKcal} kcal (${t.cal} − ${proteinKcal} protein − ${fatKcal} fat) ÷ 4`,
    },
    {
      label: 'Fibre', color: 'var(--fibre)', grams: t.fibre,
      formula: `Standard target for active adults`,
    },
  ];

  return `
  <div class="card" style="margin-top:-10px;border-top-left-radius:0;border-top-right-radius:0;border-top:none;margin-bottom:12px;padding-top:12px">
    ${rows.map(([label, val, col], idx) => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;${idx < rows.length - 1 ? 'border-bottom:1px solid #f3f4f6' : ''}">
        <span style="font-size:13px;color:#374151">${label}</span>
        <span style="font-size:13px;font-weight:700;color:${col};font-family:monospace">${val}</span>
      </div>`).join('')}
    <div style="display:flex;justify-content:space-between;align-items:center;padding:11px 0 8px;border-top:2px solid #111;margin-top:4px">
      <span style="font-size:13px;font-weight:600">Today's target</span>
      <span style="font-size:14px;font-weight:700;font-family:monospace">${t.cal} kcal</span>
    </div>

    <div style="margin-top:14px;padding-top:14px;border-top:1px solid #f3f4f6">
      <div class="mono" style="font-size:10px;color:var(--muted);letter-spacing:.1em;margin-bottom:10px">HOW MACROS WERE SET</div>
      ${macroRows.map((m, idx) => `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:9px 0;${idx < macroRows.length - 1 ? 'border-bottom:1px solid #f3f4f6' : ''}">
          <div style="flex:1;min-width:0">
            <div class="mono" style="font-size:10px;color:${m.color};letter-spacing:.08em;margin-bottom:3px">${m.label.toUpperCase()}</div>
            <div style="font-size:12px;color:var(--subtle);line-height:1.5">${m.formula}</div>
          </div>
          <span style="font-size:14px;font-weight:700;color:${m.color};font-family:monospace;white-space:nowrap">${m.grams}g</span>
        </div>`).join('')}
    </div>

    <p style="font-size:11px;color:var(--muted);margin-top:10px;line-height:1.6">Mifflin-St Jeor BMR · ×${actMult} ${actName} · goal and training adjustments applied on top. Adjust your profile if these feel off.</p>
  </div>`;
}

function renderMicroNudge(goal) {
  const nudges = {

// ─── Meal scoring ─────────────────────────────────────────────────────────────
function calcMealScore(totals, targets, profile) {
  const m = 1 / 3; // per-meal fraction of daily targets
  const ip  = Math.max(targets.protein * m, 1);
  const ic  = Math.max(targets.carbs   * m, 1);
  const iff = Math.max(targets.fat     * m, 1);
  const ifi = Math.max(targets.fibre   * m, 1);

  // Protein: 0–35 pts — central to every goal
  const pr = Math.min(totals.protein / ip, 1.5);
  const pScore = pr >= 1.0 ? 35 : Math.round(pr / 1.0 * 35);

  // Carbs: 0–25 pts — goal-weighted
  const cr = totals.carbs / ic;
  let cScore;
  if (profile.goal === 'fat') {
    cScore = cr <= 0.9 ? 25 : cr <= 1.1 ? 20 : Math.max(20 - (cr - 1.1) * 40, 0);
  } else if (profile.goal === 'fuel') {
    cScore = Math.min(cr / 1.0, 1) * 25;
  } else {
    cScore = cr <= 1.2 ? Math.min(cr / 1.2, 1) * 23 : Math.max(23 - (cr - 1.2) * 25, 0);
  }
  cScore = Math.round(Math.max(0, Math.min(cScore, 25)));

  // Fat: 0–20 pts — penalise excess more for fat-loss goal
  const fr = totals.fat / iff;
  let fScore = fr <= 1.0 ? 20 : fr <= 1.4 ? Math.round(20 - (fr - 1.0) / 0.4 * 10) : Math.max(10 - (fr - 1.4) * 15, 0);
  if (profile.goal === 'fat' && fr > 1.2) fScore = Math.max(fScore - 5, 0);
  fScore = Math.round(Math.max(0, Math.min(fScore, 20)));

  // Fibre: 0–15 pts
  const fiScore = Math.round(Math.min(totals.fibre / ifi, 1) * 15);

  // Calorie reasonableness: 0–5 pts
  const calR = totals.cal / Math.max(targets.cal * m, 1);
  let calScore = (calR >= 0.15 && calR <= 1.6) ? 5 : calR > 1.6 ? Math.max(5 - (calR - 1.6) * 8, 0) : Math.round(calR / 0.15 * 5);
  calScore = Math.round(Math.max(0, Math.min(calScore, 5)));

  const raw = pScore + cScore + fScore + fiScore + calScore;
  return Math.min(Math.max(raw, 18), 93); // never 100, minimum 18
}

function generateVerdictText(score, totals, targets, profile) {
  const m    = 1 / 3;
  const ip   = Math.round(targets.protein * m);
  const iff  = Math.round(targets.fat     * m);
  const ifi  = Math.round(targets.fibre   * m);
  const ic   = Math.round(targets.carbs   * m);

  const goalLabel = { fuel: 'performance', muscle: 'building muscle', fat: 'fat loss', recomp: 'recomposition' }[profile.goal] || 'your goal';

  const pHigh  = totals.protein >= ip * 1.05;
  const pGood  = totals.protein >= ip * 0.82;
  const pLow   = totals.protein <  ip * 0.55;
  const fHigh  = totals.fat     >  iff * 1.35;
  const cHigh  = totals.carbs   >  ic  * 1.35;
  const fiLow  = totals.fibre   <  ifi * 0.45;
  const fiGood = totals.fibre   >= ifi * 0.75;
  const cLow   = totals.carbs   <  ic  * 0.55;

  const lines = [];
  lines.push(`Given your ${goalLabel} goal, this meal scores ${score}/100.`);

  // Protein
  if (pHigh)      lines.push(`Protein is strong at ${totals.protein}g — that's doing real work.`);
  else if (pGood) lines.push(`Protein is solid at ${totals.protein}g.`);
  else if (pLow)  lines.push(`Protein is low at ${totals.protein}g — aim for closer to ${ip}g per meal.`);
  else            lines.push(`Protein is decent at ${totals.protein}g, though you could push it to ${ip}g.`);

  // Key gap or strength
  if (fHigh && profile.goal === 'fat')        lines.push(`Fat is higher than ideal for a deficit — it's eating into your calorie budget.`);
  else if (cHigh && profile.goal === 'fat')   lines.push(`Carbs are on the high side for a fat loss meal.`);
  else if (cLow  && profile.goal === 'fuel')  lines.push(`Carbs are lower than ideal for a performance goal — fuel your session properly.`);
  else if (fiLow)                             lines.push(`Fibre is low, which will affect satiety later.`);
  else if (fiGood && pGood)                   lines.push(`Good fibre content too — solid overall structure.`);

  return lines.join(' ');
}

function homeTargetsExplainer(p, targets) {
  const bmr     = calcBMR(p);
  const actMult = { sedentary: 1.2, light: 1.375, moderate: 1.55 }[p.activityLevel] || 1.55;
  const actName = { sedentary: 'sedentary', light: 'lightly active', moderate: 'moderately active' }[p.activityLevel] || 'moderately active';
  const tdee    = Math.round(bmr * actMult);
  const goalCopy = {
    fuel: {
      headline: "You're fuelling performance.",
      body: `Calories sit at maintenance — you're training hard enough that a surplus isn't useful, you just need to match what you burn. Protein at ${Math.round(p.weight * 1.8)}g keeps muscle repaired and adapting (research consistently shows 1.6–2.0g/kg covers the ceiling for athletic goals). Carbs are the priority fuel for high-intensity work — your muscles physically can't burn fat fast enough during hard efforts. Fat at 25% keeps hormones in order; below 20% and testosterone starts dropping, which matters for recovery.`
    },
    muscle: {
      headline: "You're building muscle. That takes fuel.",
      body: `A 10% calorie surplus gives your body the raw material to lay down new tissue without piling on fat — the sweet spot backed by Barakat et al. and confirmed across dozens of resistance training studies. Protein at ${Math.round(p.weight * 2.0)}g/kg is at the evidence-based ceiling for muscle protein synthesis (Stokes et al. 2018 meta-analysis puts the ceiling around 1.6g/kg; we go a touch higher because training volume creates more demand). Carbs are high because glycogen drives training performance — and training performance is what signals the body to grow.`
    },
    fat: {
      headline: "You're losing fat without losing muscle.",
      body: `A 15% deficit sits in the zone researchers call "aggressive but sustainable" — meaningful fat loss without tanking your metabolism or cannibalising muscle. The high protein target (${Math.round(p.weight * 2.2)}g/kg) is the most important number here: on a deficit, dietary protein is the primary shield against muscle loss. Helms et al. (2014) found that natural athletes cutting calories need significantly more protein than bulking athletes — the body uses it defensively. Fat stays at 30% because dropping fat calories too low wrecks hormone production, energy, and mood long before it helps.`
    },
    recomp: {
      headline: "Recomp is nutrition on a knife's edge.",
      body: `You're trying to lose fat and build (or hold) muscle at the same time. Calories sit at maintenance because you need to be in a slight surplus for muscle synthesis and a slight deficit for fat loss — simultaneously. Your body can do this, but only with enough protein to make it happen. ${Math.round(p.weight * 2.3)}g/kg is the highest target WISE uses: Barakat et al. (2020) found this ceiling is where recomp athletes maximise muscle retention during fat loss. The carbs and fat split then fuels training and keeps hormones stable. It's slower than a bulk or a cut — that's not a flaw, it's how recomp works.`
    }
  };
  const copy = goalCopy[p.goal] || goalCopy.fuel;
  const surplus = p.goal === 'muscle' ? `+${tdee < targets.cal ? targets.cal - tdee : 0} kcal above maintenance` :
                  p.goal === 'fat'    ? `${tdee - targets.cal} kcal below maintenance` :
                  `at maintenance`;
  return `

      BMR ${bmr} kcal (Mifflin-St Jeor) × ${actMult} (${actName}) = TDEE ${tdee} kcal<br>
      Goal adjustment: ${surplus}<br>
      Protein: ${targets.protein}g (${p.goal === 'fat' ? '2.2' : p.goal === 'muscle' ? '2.0' : p.goal === 'recomp' ? '2.3' : '1.8'}g × ${p.weight}kg) · Fat: ${targets.fat}g (${p.goal === 'fat' ? '30' : '25'}% of calories) · Carbs: remainder
    </div>`;
}

// Extracts a short 3–5 word dish name from Claude's verbose summary.
// Claude always starts summaries with "This looks like a/an ..." — we strip
// that prefix then cut before "with", "and", commas, or other connectors.
function extractShortMealName(summary) {
  if (!summary) return null;
  // Strip the standard preamble
  const clean = summary.replace(/^This looks like (?:a |an )?/i, '').trim();
  // Stop at "with", " and " used as a connector, commas, periods
  const short = clean.split(/\s+with\s+|\s*,|\.\s*$|\s+and\s+a\s+/)[0].trim();
  // Limit to 5 words max
  const words = short.split(/\s+/).slice(0, 5).join(' ');
  if (!words || words.length < 3) return null;
  return words.charAt(0).toUpperCase() + words.slice(1);
}

// Returns top contributors for a given macro key from today's meal logs
function getMacroContributors(todayLogs, macroKey) {
  const items = [];
  todayLogs.forEach(log => {
    (log.meal_data || []).forEach(item => {
      const m   = (item.estimatedG || 0) / 100;
      const raw = (item.per100?.[macroKey] || 0) * m;
      if (raw > 0.05) {
        items.push({ name: item.name, val: +raw.toFixed(1) });
      }
    });
  });
  // Merge duplicates (same ingredient in multiple meals)
  const merged = {};
  items.forEach(({ name, val }) => {
    const key = name.toLowerCase();
    merged[key] = { name, val: +((merged[key]?.val || 0) + val).toFixed(1) };
  });
  return Object.values(merged).sort((a, b) => b.val - a.val);
}

          const barW = Math.round((c.val / (contribs[0]?.val || 1)) * 100);
          return `
          <div style="${i < contribs.length - 1 ? 'margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid #f3f4f6' : ''}">

        }).join('')}

}

// ─── Micronutrient helpers ────────────────────────────────────────────────────
const MICRO_META = {
  vitamin_d: { label: 'Vitamin D', unit: 'µg', emoji: '☀️', decimals: 1 },
  iron:      { label: 'Iron',      unit: 'mg', emoji: '🩸', decimals: 1 },
  zinc:      { label: 'Zinc',      unit: 'mg', emoji: '🔩', decimals: 1 },
  magnesium: { label: 'Magnesium', unit: 'mg', emoji: '💪', decimals: 0 },
  b12:       { label: 'Vitamin B12', unit: 'µg', emoji: '⚡', decimals: 1 },
  calcium:   { label: 'Calcium',   unit: 'mg', emoji: '🦴', decimals: 0 },
  potassium: { label: 'Potassium', unit: 'mg', emoji: '🍌', decimals: 0 },
};

function getMicroRDAs(profile) {
  const male = (profile.sex || 'male') === 'male';
  const age  = profile.age || 30;
  return {
    vitamin_d: 15,
    iron:      male ? 8 : (age < 51 ? 18 : 8),
    zinc:      male ? 11 : 8,
    magnesium: male ? (age < 31 ? 400 : 420) : (age < 31 ? 310 : 320),
    b12:       2.4,
    calcium:   age < 51 ? 1000 : 1200,
    potassium: male ? 3400 : 2600,
  };
}

function getMicroOrder(goal) {
  const orders = {
    fat:    ['iron','b12','potassium','vitamin_d','zinc','magnesium','calcium'],
    muscle: ['vitamin_d','zinc','magnesium','iron','b12','calcium','potassium'],
    fuel:   ['magnesium','potassium','iron','vitamin_d','zinc','b12','calcium'],
    recomp: ['vitamin_d','zinc','magnesium','iron','b12','potassium','calcium'],
  };
  return orders[goal] || orders.fuel;
}

function renderMicronutrientsL1(todayLogs, profile) {
  const rdas  = getMicroRDAs(profile);
  const order = getMicroOrder(profile.goal);

  // Sum micronutrients from today's logs
  const totals = {};
  Object.keys(MICRO_META).forEach(k => { totals[k] = 0; });
  todayLogs.forEach(log => {
    const t = log.totals || {};
    Object.keys(MICRO_META).forEach(k => { totals[k] = +((totals[k] + (t[k] || 0)).toFixed(3)); });
  });

  const hasAnyData = Object.keys(MICRO_META).some(k => totals[k] > 0);

  return `
  <div class="card" style="margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:16px">🔬</span>
        <div class="label" style="margin-bottom:0">Micronutrients</div>
      </div>
    </div>
    <p style="font-size:11px;color:var(--muted);margin-bottom:14px;font-style:italic">Directional estimates · goal-priority order · log more meals for accuracy</p>
    ${todayLogs.length < 2 && !hasAnyData
      ? `<div style="text-align:center;padding:16px 0;font-size:13px;color:var(--muted)">Log at least 2 meals to see micronutrient coverage</div>`
      : order.map(key => {
          const meta  = MICRO_META[key];
          const rda   = rdas[key];
          const val   = totals[key];
          const pct   = rda > 0 ? Math.min(Math.round(val / rda * 100), 100) : 0;
          const color = pct >= 75 ? '#16a34a' : pct >= 40 ? '#d97706' : '#dc2626';
          const band  = pct >= 75 ? 'good' : pct >= 40 ? 'low' : 'very low';
          const valStr = val.toFixed(meta.decimals);
          const rdaStr = rda % 1 === 0 ? rda : rda.toFixed(1);
          return `
          <div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
              <div style="display:flex;align-items:center;gap:5px">
                <span style="font-size:13px">${meta.emoji}</span>
                <span style="font-size:12px;color:#374151;font-weight:500">${meta.label}</span>
              </div>
              <div style="display:flex;align-items:center;gap:6px">
                <span style="font-size:10px;font-family:monospace;color:${color};background:${color}18;padding:1px 6px;border-radius:99px;text-transform:uppercase;font-weight:600">${band}</span>
                <span style="font-size:11px;font-family:monospace;color:var(--subtle)">${valStr}/${rdaStr}${meta.unit}</span>
              </div>
            </div>
            <div style="height:4px;background:#e5e7eb;border-radius:99px">
              <div style="height:100%;width:${pct}%;background:${color};border-radius:99px;transition:width 0.3s"></div>
            </div>
          </div>`;
        }).join('')}
  </div>`;
}

function renderMicronutrientsL2(allLogs, profile) {
  // Activation threshold: 7+ meals across 3+ distinct days
  const distinctDays = new Set(allLogs.map(l => new Date(l.logged_at).toDateString())).size;
  if (allLogs.length < 7 || distinctDays < 3) return '';

  const rdas  = getMicroRDAs(profile);
  const order = getMicroOrder(profile.goal);

  // Compute average daily totals across the available logs
  // Group by day, sum per day, then average
  const byDay = {};
  allLogs.forEach(log => {
    const dayKey = new Date(log.logged_at).toDateString();
    if (!byDay[dayKey]) { byDay[dayKey] = {}; Object.keys(MICRO_META).forEach(k => byDay[dayKey][k] = 0); }
    const t = log.totals || {};
    Object.keys(MICRO_META).forEach(k => { byDay[dayKey][k] += (t[k] || 0); });
  });
  const days = Object.values(byDay);
  const nDays = days.length;
  const avg = {};
  Object.keys(MICRO_META).forEach(k => {
    avg[k] = +( days.reduce((s, d) => s + d[k], 0) / nDays ).toFixed(3);
  });

  // Only show nutrients that are amber or red in weekly pattern
  const flagged = order.filter(k => {
    const pct = rdas[k] > 0 ? avg[k] / rdas[k] * 100 : 100;
    return pct < 75;
  });

  if (flagged.length === 0) {
    return `
    <div class="card" style="margin-bottom:12px;background:#f0fdf4;border-color:#bbf7d0">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:18px">✅</span>
        <div>
          <div style="font-size:13px;font-weight:600;color:#15803d">Weekly pattern looks solid</div>
          <div style="font-size:12px;color:#16a34a">All 7 tracked micronutrients are broadly covered across the last ${nDays} days.</div>
        </div>
      </div>
    </div>`;
  }

  // Bioavailability flags
  const bioFlags = [];
  const ironSources = allLogs.flatMap(l => (l.meal_data || [])
    .filter(item => (item.per100?.iron || 0) > 0.5)
    .map(item => item.name.toLowerCase()));
  const plantIronWords = ['spinach','lentil','chickpea','tofu','bean','kale','oat','broccoli','pea','tempeh','hemp','quinoa'];
  const animalIronWords = ['beef','lamb','pork','chicken','turkey','liver','tuna','salmon','sardine','egg'];
  const hasPlantIron  = ironSources.some(n => plantIronWords.some(w => n.includes(w)));
  const hasAnimalIron = ironSources.some(n => animalIronWords.some(w => n.includes(w)));
  if (flagged.includes('iron') && hasPlantIron && !hasAnimalIron) {
    bioFlags.push('Your iron is mostly non-heme (plant-based) — it absorbs 2–15% vs 15–35% for meat sources. Pair iron-rich foods with vitamin C (peppers, tomatoes, citrus) to improve absorption.');
  }
  const ironPct = rdas.iron > 0 ? avg.iron / rdas.iron * 100 : 100;
  const calcPct = rdas.calcium > 0 ? avg.calcium / rdas.calcium * 100 : 100;
  const vitdPct = rdas.vitamin_d > 0 ? avg.vitamin_d / rdas.vitamin_d * 100 : 100;
  if (calcPct >= 75 && vitdPct < 40) {
    bioFlags.push('You\'re getting enough calcium but vitamin D is consistently low — vitamin D is required to absorb calcium properly. Consider fatty fish (salmon, sardines) or egg yolks.');
  }
  const highPhytateFoods = allLogs.flatMap(l => (l.meal_data||[]).map(i => i.name.toLowerCase()))
    .filter(n => ['oat','lentil','chickpea','bean','whole wheat','bran','soy'].some(w => n.includes(w)));
  if (flagged.includes('zinc') && highPhytateFoods.length > 3) {
    bioFlags.push('High-phytate foods (oats, legumes) in your diet can block zinc absorption. Soaking or fermenting them helps, or add zinc from meat and seeds alongside.');
  }

  // Food fix suggestions (concise, tailored to what they eat)
  const foodFixes = {
    vitamin_d: 'Salmon, sardines, or egg yolks 3×/week covers most of it. Or a daily vitamin D3 supplement.',
    iron:      'Lean red meat 2–3×/week. If plant-based: lentils + red pepper in the same meal.',
    zinc:      'Pumpkin seeds (1 tbsp = ~2mg zinc) on salads or oats. Or lean red meat.',
    magnesium: 'Dark chocolate, almonds, spinach, or pumpkin seeds. Easy to add to existing meals.',
    b12:       'Eggs, meat, or dairy cover this easily. If plant-based, B12 supplementation is essential.',
    calcium:   'Yogurt, milk, hard cheese, or fortified oat milk. One serving gets you 25–30% of RDA.',
    potassium: 'Banana, sweet potato, spinach, or avocado. Widely available in whole foods.',
  };

  return `
  <div class="card" style="margin-bottom:12px;background:linear-gradient(135deg,#fefce8 0%,#ffffff 100%);border-color:#fde68a">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <span style="font-size:16px">📊</span>
      <div>
        <div style="font-size:13px;font-weight:600;color:#92400e">Weekly pattern — ${nDays} days</div>
        <div style="font-size:11px;color:#b45309">${flagged.length} nutrient${flagged.length!==1?'s':''} consistently low</div>
      </div>
    </div>
    ${flagged.map(key => {
      const meta = MICRO_META[key];
      const pct  = Math.round(avg[key] / rdas[key] * 100);
      const color = pct >= 40 ? '#d97706' : '#dc2626';
      const avgStr = avg[key].toFixed(meta.decimals);
      const rdaStr = rdas[key] % 1 === 0 ? rdas[key] : rdas[key].toFixed(1);
      return `
      <div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #fde68a">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div style="display:flex;align-items:center;gap:5px">
            <span style="font-size:13px">${meta.emoji}</span>
            <span style="font-size:13px;font-weight:600;color:#374151">${meta.label}</span>
          </div>
          <span style="font-size:11px;font-family:monospace;color:${color}">${pct}% of RDA avg</span>
        </div>
        <div style="font-size:12px;color:#374151;line-height:1.5;margin-bottom:6px">${foodFixes[key]}</div>
        <div style="height:3px;background:#e5e7eb;border-radius:99px">
          <div style="height:100%;width:${Math.min(pct,100)}%;background:${color};border-radius:99px"></div>
        </div>
      </div>`;
    }).join('')}
    ${bioFlags.length > 0 ? `
    <div style="margin-top:4px">
      <div class="mono" style="font-size:10px;color:#92400e;letter-spacing:.08em;margin-bottom:8px">ABSORPTION NOTES</div>
      ${bioFlags.map(f => `<div style="font-size:12px;color:#374151;line-height:1.5;margin-bottom:8px;padding-left:8px;border-left:2px solid #fbbf24">${f}</div>`).join('')}
    </div>` : ''}
  </div>`;
}

function renderRecentMeals() {
  if (state.mealLogsLoading) {
    return `<div style="margin-top:24px;text-align:center;padding:16px 0">
      <div class="spinner" style="margin:0 auto 8px"></div>
      <div style="font-size:12px;color:var(--muted);font-family:monospace">Loading meal history…</div>
    </div>`;
  }
  if (!state.mealLogs.length) return '';

  // Group by calendar date (local time)
  const todayMidnight = new Date(); todayMidnight.setHours(0,0,0,0);
  const yesterdayMidnight = new Date(todayMidnight); yesterdayMidnight.setDate(yesterdayMidnight.getDate()-1);
  const groups = {};
  state.mealLogs.forEach((log, i) => {
    const d = new Date(log.logged_at); d.setHours(0,0,0,0);
    const key = d.toISOString().split('T')[0]; // YYYY-MM-DD
    if (!groups[key]) groups[key] = { date: d, logs: [] };
    groups[key].logs.push({ log, i });
  });
  const sortedKeys = Object.keys(groups).sort().reverse(); // newest first

  const targets = calcTargets(state.profile);

  const groupsHTML = sortedKeys.map(key => {
    const { date, logs } = groups[key];
    const isToday = date.getTime() === todayMidnight.getTime();
    const isYest  = date.getTime() === yesterdayMidnight.getTime();
    // Skip today — shown inline on home screen already
    if (isToday) return '';
    const label = isYest ? 'Yesterday'
                : date.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });
    const listId = 'mg-' + key;

    // Incomplete day: has meals but total calories look like a meal was missed (< 70% of target)
    const dayCal = logs.reduce((s, { log }) => s + (log.totals?.cal || 0), 0);
    const isIncomplete = dayCal > 0 && dayCal < targets.cal * 0.70;

    const HISTORY_SLOT_EMOJI = { breakfast:'🌅', lunch:'☀️', dinner:'🌙', snack:'🍎' };
    const mealsHTML = logs.map(({ log, i }) => {
      const dt = new Date(log.logged_at);
      const timeStr = dt.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
      const preview = (log.meal_data || []).slice(0,3).map(it => it.name).join(', ');
      const slot = log.context?.slot;
      const slotTag = slot
        ? `<span style="font-size:10px;font-family:monospace;color:var(--muted);background:#f3f4f6;border-radius:4px;padding:1px 5px;margin-right:4px">${HISTORY_SLOT_EMOJI[slot] || ''} ${slot}</span>`
        : '';
      return `<div style="display:flex;align-items:stretch;background:white;border:1px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow)">
        <button onclick="openMealLog(${i})" style="flex:1;display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;text-align:left;background:none;border:none;min-width:0">
          ${log.photo_data_url ? `<img src="${log.photo_data_url}" style="width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0">` : `<div style="width:48px;height:48px;border-radius:8px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">🍽️</div>`}
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px">${extractShortMealName(log.summary) || preview || 'Meal'}</div>
            <div style="font-size:11px;color:var(--muted);font-family:monospace">${slotTag}${timeStr} · ${log.totals?.cal || 0} kcal</div>
          </div>
          <span style="color:#d1d5db;font-size:14px;flex-shrink:0;margin-left:4px">→</span>
        </button>
        <button onclick="deleteMealLog('${log.id}')" style="padding:0 14px;background:none;border:none;border-left:1px solid var(--border);color:#d1d5db;cursor:pointer;font-size:19px;flex-shrink:0;line-height:1" title="Delete meal">×</button>
      </div>`;
    }).join('');

    const logForDate = `setState({screen:'analyse',analyseTab:'photo',photoDataUrls:[],mealText:'',mealContext:null,restaurantName:'',restaurantLocation:'',mealSlot:null,mealDate:'${key}',photoDescription:'',analysisResult:null,analysisError:null,analysing:false,viewingLog:null,mealSaveError:null})`;
    return `<div style="margin-bottom:4px">
      <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);padding:8px 2px;margin-bottom:8px">
        <button onclick="var el=document.getElementById('${listId}'),o=el.style.display!=='none';el.style.display=o?'none':'';this.querySelector('.chev').textContent=o?'▼':'▲'" style="flex:1;display:flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer;text-align:left;padding:0">
          <span style="font-size:11px;font-family:'SF Mono',monospace;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);">${label}</span>
          ${isIncomplete ? `<span style="font-size:9px;font-family:monospace;font-weight:700;padding:2px 6px;border-radius:99px;background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;letter-spacing:.04em">INCOMPLETE</span>` : ''}
          <span class="chev" style="font-size:9px;color:var(--muted)">▼</span>
        </button>
        ${isIncomplete ? `<button onclick="${logForDate}" style="font-size:11px;font-family:monospace;font-weight:600;padding:3px 10px;border-radius:99px;background:#111;color:white;border:none;cursor:pointer;flex-shrink:0">+ Log meal</button>` : ''}
      </div>
      <div id="${listId}" style="display:none">${mealsHTML}</div>
    </div>`;
  }).join('');

  return `<div style="margin-top:8px">${groupsHTML}</div>`;
}

function renderHome() {
  const p = state.profile;
  const targets = calcTargets(p);
  const goal = {fuel:'Performance',muscle:'Build Muscle',fat:'Lose Fat',recomp:'Recomposition'}[p.goal];
  const todayStr  = new Date().toDateString();
  const dateLabel = new Date().toLocaleDateString('en-GB', {weekday:'short', day:'numeric', month:'short'});

  // ── Today's logs ──────────────────────────────────────────────────────────
  const todayLogs = state.mealLogs.filter(l => l.logged_at && new Date(l.logged_at).toDateString() === todayStr);

  const running = todayLogs.reduce((acc, log) => {
    const t = log.totals || {};
    return {
      cal:      Math.round(acc.cal      + (t.cal      || 0)),
      protein:  +((acc.protein  + (t.protein  || 0)).toFixed(1)),
      fat:      +((acc.fat      + (t.fat      || 0)).toFixed(1)),
      carbs:    +((acc.carbs    + (t.carbs    || 0)).toFixed(1)),
      fibre:    +((acc.fibre    + (t.fibre    || 0)).toFixed(1)),
      vitamin_d:+((acc.vitamin_d+(t.vitamin_d || 0)).toFixed(3)),
      iron:     +((acc.iron     +(t.iron      || 0)).toFixed(2)),
      zinc:     +((acc.zinc     +(t.zinc      || 0)).toFixed(2)),
      magnesium:+((acc.magnesium+(t.magnesium || 0)).toFixed(1)),
      b12:      +((acc.b12      +(t.b12       || 0)).toFixed(2)),
      calcium:  +((acc.calcium  +(t.calcium   || 0)).toFixed(1)),
      potassium:+((acc.potassium+(t.potassium || 0)).toFixed(1)),
    };
  }, { cal:0, protein:0, fat:0, carbs:0, fibre:0, vitamin_d:0, iron:0, zinc:0, magnesium:0, b12:0, calcium:0, potassium:0 });

  // ── Progress badge ────────────────────────────────────────────────────────
  const calPct = targets.cal > 0 ? Math.round((running.cal / targets.cal) * 100) : 0;
  const badgeColor = calPct >= 90 ? '#16a34a' : calPct >= 50 ? '#d97706' : '#6b7280';
  const badgeBg    = calPct >= 90 ? '#f0fdf4' : calPct >= 50 ? '#fffbeb' : '#f3f4f6';

  // ── Macro progress bar helper ─────────────────────────────────────────────
  function mBar(label, consumed, target, color) {
    const pct  = target > 0 ? Math.min(100, Math.round((consumed / target) * 100)) : 0;
    const over = consumed > target * 1.05;
    const c    = over ? '#dc2626' : color;
    return `
      <div style="min-width:0">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px">
          <span style="font-size:9px;font-family:monospace;letter-spacing:.08em;font-weight:600;color:${c}">${label}${over?' !':''}</span>
          <span style="font-size:11px;font-family:monospace;color:${over?'#dc2626':'var(--text)'}"><strong>${consumed}</strong><span style="color:var(--muted)">/${target}g</span></span>
        </div>
        <div style="height:3px;background:#f3f4f6;border-radius:99px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${c};border-radius:99px"></div>
        </div>
      </div>`;
  }

  // ── Gaps summary ──────────────────────────────────────────────────────────
  const gaps     = getGaps(running, targets);
  const problems = gaps.filter(g => g.impact !== 'GOOD');

  // ── Low micronutrients ────────────────────────────────────────────────────
  const rdas = getMicroRDAs(p);
  const MICRO_LABELS = { vitamin_d:'Vitamin D', iron:'Iron', zinc:'Zinc', magnesium:'Magnesium', b12:'B12', calcium:'Calcium', potassium:'Potassium' };
  const lowMicros = Object.entries(rdas)
    .filter(([key, rda]) => rda > 0 && (running[key] / rda) * 100 < 40)

      </div>`;

  // Unlogged slot placeholders
  const showPlaceholders = ['lunch','dinner'].filter(slot =>
    !loggedSlots.has(slot) && (slot === 'lunch' ? nowHour >= 11 : nowHour >= 16)

  const placeholderRows = showPlaceholders.map(slot => `
    <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f9fafb;opacity:.45">

    <!-- Header -->
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px">

function getIngredientRowsFromDOM() {
  const rows = [];
  for (let i = 0; i < 30; i++) {
    const nameEl = document.getElementById(`ing-row-name-${i}`);
    if (!nameEl) break;
    const qtyEl  = document.getElementById(`ing-row-qty-${i}`);
    const unitEl = document.getElementById(`ing-row-unit-${i}`);
    rows.push({ name: nameEl.value, qty: qtyEl ? qtyEl.value : '', unit: unitEl ? unitEl.value : 'g' });
  }
  return rows;
}
function addIngredientRow() {
  const rows = getIngredientRowsFromDOM();
  rows.push({ name: '', qty: '', unit: 'g' });
  setState({ ingredientRows: rows });
}
function removeIngredientRow(idx) {
  const rows = getIngredientRowsFromDOM();
  rows.splice(idx, 1);
  setState({ ingredientRows: rows });
}
function parseAmountToGrams(amount) {
  if (!amount) return null;
  const s = amount.trim().toLowerCase();
  const g   = s.match(/^([\d.]+)\s*g$/);       if (g)    return parseFloat(g[1]);
  const ml  = s.match(/^([\d.]+)\s*ml$/);      if (ml)   return parseFloat(ml[1]);
  const oz  = s.match(/^([\d.]+)\s*oz$/);      if (oz)   return Math.round(parseFloat(oz[1]) * 28.35);
  const tb  = s.match(/^([\d.]+)\s*tbsp?/);    if (tb)   return Math.round(parseFloat(tb[1]) * 15);
  const ts  = s.match(/^([\d.]+)\s*tsp/);      if (ts)   return Math.round(parseFloat(ts[1]) * 5);
  const cup = s.match(/^([\d.]+)\s*cup/);      if (cup)  return Math.round(parseFloat(cup[1]) * 240);
  if (/scoop/.test(s)) { const n = s.match(/[\d.]+/); return n ? Math.round(parseFloat(n[0]) * 30) : 30; }
  const num = s.match(/^[\d.]+$/);             if (num)  return parseFloat(num[0]);
  return null;
}

async function runTableAnalysis() {
  const rows = getIngredientRowsFromDOM();
  const filled = rows.filter(r => r.name.trim());
  if (!filled.length) return;

  setState({ analyseTab: 'text', analysisResult: null, analysisError: null,
             ingredientRows: rows, screen: 'analyse', analysing: true });

  try {
    // Sequential lookups — parallel calls risk rate pressure causing dirty JSON responses
    const unitMultipliers = { g: 1, ml: 1, oz: 28.35, tsp: 5, tbsp: 15, cup: 240 };
    const fetched = [];
    for (const row of filled) {
      let per100Data, grams, confidence, reasoning;
      const qty = parseFloat(row.qty) || 0;
      try {
        if (row.unit === 'piece') {
          // Fetch per-piece weight from the edge function ("1 egg" → estimatedG ≈ 50g)
          per100Data = await fetchPieceData(row.name.trim());
          grams = Math.round((qty || 1) * per100Data.gramsPerPiece);
          reasoning = `${qty || 1} ${qty === 1 ? 'piece' : 'pieces'} × ${per100Data.gramsPerPiece}g each = ${grams}g`;
        } else {
          per100Data = await fetchPer100(row.name.trim());
          const mult = unitMultipliers[row.unit] || 1;
          grams = qty > 0 ? Math.round(qty * mult) : 100;
          reasoning = qty > 0 ? `User specified ${qty}${row.unit}` : 'Default 100g portion used';
        }
        confidence = 'High';
      } catch(_e) {
        // Single ingredient failed — use zero values rather than killing the whole analysis
        per100Data = { cal: 0, protein: 0, fat: 0, carbs: 0, fibre: 0, emoji: '🍽️' };
        grams = qty > 0 ? Math.round(qty * (unitMultipliers[row.unit] || 1)) : 100;
        confidence = 'Low';
        reasoning  = 'Nutritional lookup failed — values set to 0, edit to correct';
      }
      fetched.push({
        name: row.name.trim(),
        emoji: per100Data.emoji || '🍽️',
        estimatedG: grams,
        confidence,
        reasoning,
        per100: { cal: per100Data.cal||0, protein: per100Data.protein||0,
                  fat: per100Data.fat||0, carbs: per100Data.carbs||0, fibre: per100Data.fibre||0 }
      });
    }

    const mealText = filled.map(r => {
      const qty = r.qty || '';
      const unitLabel = r.unit === 'piece' ? (parseFloat(r.qty) === 1 ? 'piece' : 'pieces') : r.unit;
      return qty ? `${qty} ${unitLabel} ${r.name.trim()}` : r.name.trim();
    }).join(', ');
    const names    = filled.map(r => r.name.trim());
    const result = {
      ambiguous: false,
      summary: `This looks like a meal with ${names.join(', ')}.`,
      identified: fetched,
      assumptions: ['Nutritional data from USDA FoodData Central per ingredient', 'User-provided ingredient list — no visual estimation needed'],
      confidence: 'High',
      confidenceNote: 'Ingredients entered directly by user'
    };

    setState({ mealText, analysing: false, analysisResult: result, screen: 'results', ingredientsVerified: 'yes' });
    await saveMealLog(result);
  } catch(err) {
    setState({ analysing: false, analysisError: err.message || 'Analysis failed. Please try again.' });
  }
}

function renderAmbiguousResult(r) {
  const reason = r.ambiguityReason || '';

  // Extract the dish name Claude named in its reason string.
  // Claude usually writes things like "This appears to be a fried rice dish" or
  // "Beef bourguignon — sauce obscures proportions". Pull that out and use it in the copy.
  function extractDishName(str) {
    if (!str) return null;
    const patterns = [
      /this (?:appears?|seems?) to be (?:a |an )?([\w\s]{3,30}?)(?:\s*[-—,.;]|$)/i,
      /appears? to be (?:a |an )?([\w\s]{3,30}?)(?:\s*[-—,.;]|$)/i,
      /looks? like (?:a |an )?([\w\s]{3,30}?)(?:\s*[-—,.;]|$)/i,
      /(?:is|are) (?:a |an )?([\w\s]{3,25}?) (?:dish|meal|bowl|recipe|stew|curry)/i,
      /^([\w\s]{3,28}?) (?:dish|meal|bowl|where|with|that|–|—|-)/i,
    ];
    for (const pat of patterns) {
      const m = str.match(pat);
      if (m && m[1]) {
        const candidate = m[1].trim().replace(/\s+/g, ' ');
        // Reject generic single words and candidates that start with verbs/articles
        const startsWithBadWord = /^(is|are|was|were|it |a |an |the |this |that )/i.test(candidate);
        const isGenericSingle = /^(the|this|a|an|it|meal|dish|food|photo|image|picture|ingredients?)$/i.test(candidate);
        if (!startsWithBadWord && !isGenericSingle) {
          return candidate.charAt(0).toUpperCase() + candidate.slice(1).toLowerCase();
        }
      }
    }
    return null;
  }

  const dishName = extractDishName(reason);
  const an = dishName && /^[aeiou]/i.test(dishName) ? 'an' : 'a';

  // Detect category — isBlended requires drink-specific language, not just "blended"
  const isBlended = /smoothie|shake|protein.shake|juice|blended.drink|liquid.drink/i.test(reason);
  const isSauce   = /sauce|gravy|curry|stew|soup|dal|daal/i.test(reason);
  const isHidden  = /hidden|inside|wrap|sandwich|pie|pastry|burger/i.test(reason);
  const isMixed   = /fried.rice|mixed|stir.fry|stir-fry|rice.dish|noodle|pasta|composed|combined|proportion/i.test(reason);

  const friendlyMsg = isBlended
    ? `Looks like ${dishName ? an + ' ' + dishName : 'a smoothie or shake'} — something's been blended and I can't tell what went in from the outside. Tell me what you put in and I'll work it out.`
    : isSauce
    ? `That looks like ${dishName ? an + ' ' + dishName : 'a curry or stew'} — once everything's cooked together the sauce hides a lot. Tell me roughly what went in and I'll work it out.`
    : isHidden
    ? `That looks like ${dishName ? an + ' ' + dishName : 'something good'} — I can see the outside but not what's inside. Tell me what you put in and I'll crunch the numbers.`
    : isMixed
    ? `That looks like ${dishName ? an + ' ' + dishName : 'a mixed dish'} — I can see the ingredients but can't split out the exact amounts when it's all cooked together. Tell me roughly what went in and I'll work it out.`
    : dishName
    ? `That looks like ${an} ${dishName} — I can see what's there but I can't get accurate amounts from the photo alone. Tell me what went in and I'll crunch the numbers.`
    : "I can see something delicious here but I can't work out the exact ingredients from the photo alone. Tell me what went in and I'll crunch the numbers.";

  return `
    <button class="btn-back" onclick="setState({screen:'analyse',analysisResult:null,assumptionsExpanded:false,ingredientRows:[{name:'',qty:'',unit:'g'},{name:'',qty:'',unit:'g'},{name:'',qty:'',unit:'g'},{name:'',qty:'',unit:'g'}]})">← Back</button>

    <div style="text-align:center;padding:16px 0 24px">
      <div style="font-size:48px;margin-bottom:12px">🔍</div>
      <h2 style="font-size:21px;font-weight:600;letter-spacing:-.02em;margin-bottom:10px">WISE can't see inside this one</h2>
      <p style="font-size:14px;color:#374151;line-height:1.6;max-width:340px;margin:0 auto">${friendlyMsg}</p>
    </div>

    <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:14px;padding:14px 16px;margin-bottom:16px;display:flex;gap:10px">
      <span style="font-size:18px;flex-shrink:0">⚠️</span>
      <p style="font-size:13px;color:#92400e;line-height:1.6;margin:0">A confident-looking wrong answer is worse than no answer. WISE won't guess when it can't see what's actually in your meal.</p>
    </div>

    <div class="label" style="margin-bottom:10px">Get an accurate analysis</div>

    <div class="card" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
        <span style="font-size:20px">✏️</span>
        <div style="font-size:14px;font-weight:600;color:var(--text)">What's in it?</div>
        <div style="font-size:12px;color:var(--muted);margin-left:4px">amounts optional</div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 58px 68px 28px;gap:6px;margin-bottom:6px">
        <div style="font-size:10px;font-family:monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:0 4px">Ingredient</div>
        <div style="font-size:10px;font-family:monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:0 4px">Qty</div>
        <div style="font-size:10px;font-family:monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:0 4px">Unit</div>
        <div></div>
      </div>

      ${state.ingredientRows.map((row, i) => `
        <div style="display:grid;grid-template-columns:1fr 58px 68px 28px;gap:6px;margin-bottom:6px;align-items:center">
          <input id="ing-row-name-${i}" type="text" value="${row.name.replace(/"/g,'&quot;')}" placeholder="${i===0 ? (isBlended?'oat milk':isSauce?'chicken':'e.g. eggs') : i===1 ? (isBlended?'protein powder':isSauce?'coconut milk':'e.g. rice') : 'ingredient'}" style="border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:14px;outline:none;font-family:inherit;width:100%">
          <input id="ing-row-qty-${i}" type="number" min="0" step="any" value="${row.qty}" placeholder="${i===0 ? (isBlended?'200':isSauce?'150':'') : ''}" style="border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:14px;outline:none;font-family:inherit;width:100%;-moz-appearance:textfield">

            <option value="g"    ${row.unit==='g'    ?'selected':''}>g</option>
            <option value="ml"   ${row.unit==='ml'   ?'selected':''}>ml</option>
            <option value="oz"   ${row.unit==='oz'   ?'selected':''}>oz</option>
            <option value="tsp"  ${row.unit==='tsp'  ?'selected':''}>tsp</option>

          </select>
          <button onclick="removeIngredientRow(${i})" style="width:28px;height:28px;border-radius:6px;border:1px solid #fecaca;background:#fef2f2;color:#dc2626;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;${state.ingredientRows.length <= 1 ? 'opacity:0;pointer-events:none' : ''}">×</button>
        </div>

      <button onclick="addIngredientRow()" style="background:none;border:none;font-size:13px;color:var(--subtle);cursor:pointer;padding:4px 0;margin-top:2px">+ Add ingredient</button>
      <button onclick="runTableAnalysis()" style="width:100%;padding:13px;border-radius:12px;border:none;background:#111;color:white;font-size:14px;font-weight:600;cursor:pointer;margin-top:12px">Analyse this meal →</button>
    </div>

      style="width:100%;display:flex;align-items:flex-start;gap:14px;padding:16px;background:white;border:1px solid var(--border);border-radius:14px;margin-bottom:10px;cursor:pointer;text-align:left;box-shadow:var(--shadow)">

    <div style="background:${calOver?'#fef2f2':'#f9fafb'};border:1px solid ${calOver?'#fecaca':'var(--border)'};border-radius:12px;padding:12px 16px;margin-bottom:8px">
